
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<title>Golf Ball Frame Tracker</title>
<style>
@font-face{
  font-family:'Good Times';
  font-weight:normal;font-style:normal;font-display:swap;
}
@font-face{
  font-family:'Avenir';
  font-weight:normal;font-style:normal;font-display:swap;
}
:root{
  --safe-top:env(safe-area-inset-top);
  --safe-right:env(safe-area-inset-right);
  --safe-bottom:env(safe-area-inset-bottom);
  --safe-left:env(safe-area-inset-left);
  --runner-black:#0c0c0c;
  --runner-red:#e7222a;
  --runner-darkred:#ba1e1e;
  --runner-steel:#1f1f1f;
  --radius-sm:6px;
  --radius-md:10px;
  --radius-lg:16px;
  --radius-xl:24px;
}
html,body{
  margin:0;
  padding:0;
  background:var(--runner-black);
  color:#fff;
  font-family:'Avenir',system-ui,-apple-system,sans-serif;
  height:100%;
  overflow:hidden;
  touch-action:manipulation;
}
#wrap{
  position:fixed;
  inset:0;
  width:100vw;
  height:100vh;
  overflow:hidden;
  background:var(--runner-black);
}
video,canvas{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
}
#overlay{
  pointer-events:none;
}

.btn-primary{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  bottom:calc(20px + var(--safe-bottom));
  background:linear-gradient(135deg,var(--runner-red),var(--runner-darkred));
  border:none;
  color:#fff;
  font-family:'Good Times',system-ui,sans-serif;
  font-size:17px;
  font-weight:900;
  letter-spacing:0.5px;
  text-transform:uppercase;
  padding:14px 32px;
  border-radius:999px;
  cursor:pointer;
  z-index:100;
  box-shadow:0 4px 20px rgba(231,34,42,0.35);
  transition:transform 0.2s ease,box-shadow 0.2s ease;
  pointer-events:auto;
}
.btn-primary:active:not(:disabled){
  transform:translateX(-50%) scale(0.98);
}
.btn-primary:disabled{
  opacity:0.4;
  cursor:not-allowed;
}

.btn-secondary{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  background:rgba(31,31,31,0.9);
  border:1px solid rgba(255,255,255,0.15);
  color:#fff;
  font-family:'Avenir',system-ui,sans-serif;
  font-size:13px;
  font-weight:700;
  letter-spacing:0.5px;
  padding:10px 24px;
  border-radius:999px;
  cursor:pointer;
  z-index:100;
  box-shadow:0 3px 14px rgba(0,0,0,0.3);
  transition:transform 0.2s ease,opacity 0.2s ease;
  pointer-events:auto;
}
.btn-secondary:active:not(:disabled){
  transform:translateX(-50%) scale(0.98);
}
.btn-secondary:disabled{
  opacity:0.4;
  cursor:not-allowed;
}

#btnStartCamera{bottom:calc(20px + var(--safe-bottom));}
#btnCaptureRef{bottom:calc(80px + var(--safe-bottom));}
#btnStartTracking{bottom:calc(135px + var(--safe-bottom));}
#btnReset{bottom:calc(190px + var(--safe-bottom));}



#statusBadge{
  position:absolute;
  top:calc(14px + var(--safe-top));
  left:calc(14px + var(--safe-left));
  font-family:'Avenir',system-ui,sans-serif;
  font-size:12px;
  font-weight:800;
  padding:10px 14px;
  border-radius:var(--radius-md);
  background:rgba(31,31,31,0.9);
  border:1px solid rgba(255,255,255,0.08);
  z-index:10;
  white-space:pre-line;
  max-width:200px;
  line-height:1.4;
}

#metricsPanel{
  position:absolute;
  top:calc(14px + var(--safe-top));
  right:calc(14px + var(--safe-right));
  z-index:10;
  background:rgba(31,31,31,0.9);
  border:1px solid rgba(255,255,255,0.08);
  padding:12px 14px;
  border-radius:var(--radius-md);
  backdrop-filter:blur(8px);
  display:none;
  min-width:140px;
}
#metricsPanel.show{display:block;}
.metric-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:8px;
  gap:16px;
}
.metric-row:last-child{margin-bottom:0;}
.metric-label{
  font-size:10px;
  text-transform:uppercase;
  letter-spacing:0.1em;
  color:rgba(255,255,255,0.6);
  font-weight:700;
}
.metric-value{
  font-family:'Good Times',system-ui,sans-serif;
  font-size:13px;
  color:#fff;
  font-weight:900;
}

.detection-box{
  position:absolute;
  border:3px dashed rgba(255,255,255,0.6);
  border-radius:var(--radius-md);
  pointer-events:none;
  opacity:0.7;
  transition:all 0.3s ease;
}
.detection-box.detecting{
  border-color:var(--runner-red);
  border-style:solid;
  animation:pulse-detect 1.5s ease-in-out infinite;
}
.detection-box.locked{
  border-color:#00ff88;
  border-style:solid;
  opacity:1;
  animation:pulse-locked 2s ease-in-out infinite;
}
.box-label{
  position:absolute;
  top:-28px;
  left:50%;
  transform:translateX(-50%);
  font-family:'Good Times',system-ui,sans-serif;
  font-size:11px;
  font-weight:900;
  color:rgba(255,255,255,0.9);
  text-transform:uppercase;
  letter-spacing:0.15em;
  white-space:nowrap;
}

@keyframes pulse-detect{
  0%,100%{opacity:0.7;box-shadow:0 0 0 0 rgba(231,34,42,0.4);}
  50%{opacity:1;box-shadow:0 0 20px 5px rgba(231,34,42,0.2);}
}
@keyframes pulse-locked{
  0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(0,255,136,0.4);}
  50%{opacity:0.85;box-shadow:0 0 20px 5px rgba(0,255,136,0.3);}
}

.toast{
  position:fixed;
  bottom:calc(200px + var(--safe-bottom));
  left:50%;
  transform:translateX(-50%);
  background:rgba(31,31,31,0.95);
  border:1px solid var(--runner-red);
  border-radius:var(--radius-md);
  padding:12px 20px;
  color:#fff;
  font-family:'Avenir',system-ui,sans-serif;
  font-size:13px;
  font-weight:700;
  box-shadow:0 8px 32px rgba(0,0,0,0.5);
  z-index:1000;
  animation:slideUp 0.3s ease-out;
  backdrop-filter:blur(10px);
  pointer-events:none;
}
@keyframes slideUp{
  from{opacity:0;transform:translate(-50%, 20px);}
  to{opacity:1;transform:translate(-50%, 0);}
}
/* ===== EV SLIDER ===== */
#evPanel{
  position:absolute;
  bottom:calc(250px + var(--safe-bottom));
  left:50%;
  transform:translateX(-50%);
  background:rgba(31,31,31,0.92);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:var(--radius-lg);
  padding:12px 18px 10px;
  z-index:100;
  pointer-events:auto;
  display:none;
  min-width:250px;
  backdrop-filter:blur(10px);
}
#evPanel.show{display:block;}
.ev-row{
  display:flex;
  align-items:center;
  gap:10px;
}
.ev-label{
  font-family:'Good Times',system-ui,sans-serif;
  font-size:10px;
  font-weight:900;
  letter-spacing:0.12em;
  color:rgba(255,255,255,0.6);
  white-space:nowrap;
}
.ev-val{
  font-family:'Good Times',system-ui,sans-serif;
  font-size:13px;
  color:var(--runner-red);
  font-weight:900;
  min-width:48px;
  text-align:right;
}
#evSlider{
  -webkit-appearance:none;
  appearance:none;
  flex:1;
  height:4px;
  border-radius:99px;
  background:rgba(255,255,255,0.15);
  outline:none;
  cursor:pointer;
}
#evSlider::-webkit-slider-thumb{
  -webkit-appearance:none;
  width:18px;height:18px;
  border-radius:50%;
  background:linear-gradient(135deg,var(--runner-red),var(--runner-darkred));
  cursor:pointer;
  box-shadow:0 2px 8px rgba(231,34,42,0.5);
}
#evSlider::-moz-range-thumb{
  width:18px;height:18px;border-radius:50%;
  background:linear-gradient(135deg,var(--runner-red),var(--runner-darkred));
  border:none;cursor:pointer;
}
.ev-hint{
  margin-top:6px;
  font-size:10px;
  color:rgba(255,255,255,0.3);
  text-align:center;
}
</style>
</head>

<body>
<div id="wrap">
  <video id="video" playsinline autoplay muted></video>
  <canvas id="overlay"></canvas>

  <div id="statusBadge">Initializing...</div>

  <div id="metricsPanel">
    <div class="metric-row">
      <span class="metric-label">FRAMES</span>
      <span class="metric-value" id="frameCount">0</span>
    </div>
    <div class="metric-row">
      <span class="metric-label">ANGLE</span>
      <span class="metric-value" id="angle">--</span>
    </div>
    <div class="metric-row">
      <span class="metric-label">DIRECTION</span>
      <span class="metric-value" id="direction">--</span>
    </div>
  </div>

  <div id="evPanel">
    <div class="ev-row">
      <span class="ev-label">⚡ EV</span>
      <input type="range" id="evSlider" min="-3" max="0" step="0.5" value="-2">
      <span class="ev-val" id="evVal">-2.0</span>
    </div>
    <div class="ev-hint">Drag left = faster shutter = less blur</div>
  </div>

  <button class="btn-primary" id="btnStartCamera">START CAMERA</button>
  <button class="btn-secondary" id="btnCaptureRef" disabled>CAPTURE REFERENCE</button>
  <button class="btn-secondary" id="btnStartTracking" disabled>START TRACKING</button>
  <button class="btn-secondary" id="btnReset" disabled>RESET</button>
</div>

<script>
/* ===================== CONFIG ===================== */
const DIFF_THR = 30;
const MIN_BLOB_PX = 15;
const MAX_BLOB_PX = 40000;     // Large ball close to camera can be thousands of pixels
const MIN_CIRCULARITY = 0.5;
const BOX_SIZE = 200;
const MIN_RADIUS_PX = 8;
const MAX_RADIUS_PX = 200;     // Allow up to 200px radius — ball fills the box at close range
const STEP = 3;
const ROI_TRACKING = 120;
const ROI_SEARCHING = 250;
const USE_VERTICAL_STRIP = true;
const STRIP_WIDTH_PERCENT = 0.35;
const USE_RAW_DETECTION = true;

// Exposure is now set automatically based on scene brightness
/* ================================================== */

const video = document.getElementById("video");
const overlay = document.getElementById("overlay");
const ctx = overlay.getContext("2d", {willReadFrequently: true});

const btnStartCamera = document.getElementById("btnStartCamera");
const btnCaptureRef = document.getElementById("btnCaptureRef");
const btnStartTracking = document.getElementById("btnStartTracking");
const btnReset = document.getElementById("btnReset");
const statusBadge = document.getElementById("statusBadge");
const metricsPanel = document.getElementById("metricsPanel");
const evPanel = document.getElementById("evPanel");
const evSlider = document.getElementById("evSlider");
const evVal = document.getElementById("evVal");

/* ===== STATE ===== */
let stream = null;
let videoTrack = null;
let referenceFrame = null;
let tracking = false;
let capturedFrames = [];
let detectionBox = null;
let kalmanFilter = null;
let lastKnownPosition = null;
let lockedRadius = null;
let ballTemplate = null;       // Cropped pixel patch of the ball (Float32Array of normalised luminance)
let templateSize = 0;          // Side length of the square template (pixels)
let missedFrames = 0;
const MAX_MISSED_FRAMES = 3;
let trackingLoopId = null;
let lastCaptureTime = 0;
const MIN_CAPTURE_INTERVAL_MS = 0;

/* ===== OFFSCREEN CANVAS ===== */
const offscreen = document.createElement("canvas");
const offscreenCtx = offscreen.getContext("2d", {willReadFrequently: true});

/* ===== HELPERS ===== */
function showToast(message) {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.textContent = message;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

function updateStatus(text) {
  statusBadge.textContent = text;
}

function updateMetrics(frameCount, angle, direction) {
  document.getElementById('frameCount').textContent = frameCount;
  document.getElementById('angle').textContent = angle !== null ? angle.toFixed(1) + '°' : '--';
  document.getElementById('direction').textContent = direction || '--';
}

function isWhitePixel(r, g, b) {
  const brightness = (r + g + b) / 3;
  if (brightness < 180) return false;
  const maxC = Math.max(r, g, b);
  const minC = Math.min(r, g, b);
  const chroma = maxC - minC;
  return chroma < 40;
}

/* ===== BRIGHTNESS CHECK ===== */
function checkBrightness(frame) {
  const data = frame.data;
  const total = frame.width * frame.height;
  // Sample every 8th pixel for speed
  const step = 8;
  let sum = 0;
  let count = 0;
  for (let i = 0; i < data.length; i += 4 * step) {
    sum += (data[i] + data[i + 1] + data[i + 2]) / 3;
    count++;
  }
  return count > 0 ? sum / count : 0; // Returns 0–255
}

/* ===== AUTO EXPOSURE ===== */
async function autoAdjustExposure() {
  const frame = grabFrame();
  const brightness = checkBrightness(frame);

  let targetEV;
  if (brightness > 80) targetEV = -3.0;
  else if (brightness > 50) targetEV = -2.5;
  else if (brightness > 30) targetEV = -2.0;
  else if (brightness > 15) targetEV = -1.5;
  else {
    targetEV = -1.0;
    showToast('⚠️ Scene too dark — add bright LED lights');
  }

  const track = video.srcObject?.getVideoTracks()[0];
  if (!track) return;

  const capabilities = track.getCapabilities ? track.getCapabilities() : {};
  if (!capabilities.exposureCompensation) {
    // Silently skip — device doesn't support EV control
    return;
  }

  // Clamp targetEV to what the device supports
  const cap = capabilities.exposureCompensation;
  targetEV = Math.max(cap.min ?? targetEV, Math.min(cap.max ?? targetEV, targetEV));

  try {
    await track.applyConstraints({ advanced: [{ exposureCompensation: targetEV }] });
    showToast(`⚡ Exposure auto-set to ${targetEV.toFixed(1)} EV (brightness: ${Math.round(brightness)})`);
  } catch (err) {
    console.warn('Auto exposure failed:', err);
  }
}

/* ===== EV SLIDER HANDLER ===== */
async function applyEV(ev) {
  const track = video.srcObject?.getVideoTracks()[0];
  if (!track) return;
  const capabilities = track.getCapabilities ? track.getCapabilities() : {};
  if (!capabilities.exposureCompensation) return;
  const cap = capabilities.exposureCompensation;
  const clamped = Math.max(cap.min ?? ev, Math.min(cap.max ?? ev, ev));
  try {
    await track.applyConstraints({ advanced: [{ exposureCompensation: clamped }] });
  } catch(e) { console.warn('EV apply failed', e); }
}

evSlider.addEventListener('input', () => {
  const ev = parseFloat(evSlider.value);
  evVal.textContent = ev.toFixed(1);
  applyEV(ev);
});


class KalmanFilter {
  constructor() {
    this.x = 0; this.y = 0;
    this.vx = 0; this.vy = 0;
    this.initialized = false;
    this.processNoise = 0.5;
    this.measurementNoise = 15;
    this.lastUpdateTime = 0;
  }
  init(x, y) {
    this.x = x; this.y = y;
    this.vx = 0; this.vy = 0;
    this.initialized = true;
    this.lastUpdateTime = performance.now();
  }
  predict() {
    if (!this.initialized) return null;
    const now = performance.now();
    const dt = Math.min((now - this.lastUpdateTime) / 1000, 0.1);
    this.x += this.vx * dt;
    this.y += this.vy * dt;
    return { x: this.x, y: this.y };
  }
  update(measurement) {
    if (!this.initialized) {
      this.init(measurement.x, measurement.y);
      return { x: this.x, y: this.y };
    }
    const now = performance.now();
    const dt = Math.max((now - this.lastUpdateTime) / 1000, 0.001);
    this.lastUpdateTime = now;
    const newVx = (measurement.x - this.x) / dt;
    const newVy = (measurement.y - this.y) / dt;
    const alpha = 0.7;
    this.vx = (1 - alpha) * this.vx + alpha * newVx;
    this.vy = (1 - alpha) * this.vy + alpha * newVy;
    const k = this.measurementNoise / (this.measurementNoise + this.processNoise);
    this.x = this.x + k * (measurement.x - this.x);
    this.y = this.y + k * (measurement.y - this.y);
    return { x: this.x, y: this.y };
  }
  getVelocity() {
    return Math.sqrt(this.vx * this.vx + this.vy * this.vy);
  }
}

/* ===== CAMERA ===== */
async function startCamera() {
  try {
    const tmp = await navigator.mediaDevices.getUserMedia({ video: true });
    tmp.getTracks().forEach(t => t.stop());

    const devices = await navigator.mediaDevices.enumerateDevices();
    const cameras = devices.filter(d => d.kind === "videoinput");

    const usb = cameras.find(d => /usb|uvc|capture|hdmi|elgato|avermedia|cam link/i.test(d.label));
    const back = cameras.find(d => /back|rear|environment/i.test(d.label));

    let constraints;
    if (usb) {
      constraints = { video: { deviceId: { exact: usb.deviceId }, width: { ideal: 1280 }, height: { ideal: 720 }, frameRate: { ideal: 30 } } };
    } else if (back) {
      constraints = { video: { deviceId: { exact: back.deviceId }, width: { ideal: 1280 }, height: { ideal: 720 }, frameRate: { ideal: 30 } } };
    } else {
      constraints = { video: { facingMode: { ideal: "environment" }, width: { ideal: 1280 }, height: { ideal: 720 }, frameRate: { ideal: 30 } } };
    }

    stream = await navigator.mediaDevices.getUserMedia(constraints);
    video.srcObject = stream;
    await video.play();

    // Get the video track for exposure control
    videoTrack = stream.getVideoTracks()[0];

    const applyDimensions = () => {
      if (!video.videoWidth || !video.videoHeight) return;
      overlay.width = video.videoWidth;
      overlay.height = video.videoHeight;
      offscreen.width = video.videoWidth;
      offscreen.height = video.videoHeight;
    };

    if (video.videoWidth && video.videoHeight) {
      applyDimensions();
    } else {
      video.addEventListener("loadedmetadata", applyDimensions, { once: true });
    }

    // Auto-adjust exposure based on scene brightness
    await new Promise(r => setTimeout(r, 500));
    await autoAdjustExposure();

    // Show EV panel so user can fine-tune if needed
    evPanel.classList.add('show');
    // Sync slider to whatever auto-adjust picked
    const track2 = stream.getVideoTracks()[0];
    if (track2?.getSettings) {
      const s = track2.getSettings();
      if (s.exposureCompensation !== undefined) {
        evSlider.value = Math.max(-3, Math.min(0, s.exposureCompensation));
        evVal.textContent = parseFloat(evSlider.value).toFixed(1);
      }
    }

    updateStatus('Camera Active\nReady to capture');
    btnStartCamera.disabled = true;
    btnCaptureRef.disabled = false;
    showToast('Camera started successfully');

  } catch (error) {
    console.error('Camera error:', error);
    showToast('Failed to access camera');
    updateStatus('Camera Error');
  }
}

/* ===== DETECTION BOX ===== */
function createDetectionBox() {
  const existing = document.querySelector('.detection-box');
  if (existing) existing.remove();
  const box = document.createElement('div');
  box.className = 'detection-box';
  box.style.width = BOX_SIZE + 'px';
  box.style.height = BOX_SIZE + 'px';
  box.style.left = '50%';
  box.style.top = '50%';
  box.style.transform = 'translate(-50%, -50%)';
  const label = document.createElement('div');
  label.className = 'box-label';
  label.textContent = 'BALL AREA';
  box.appendChild(label);
  document.getElementById('wrap').appendChild(box);
  detectionBox = box;
}

function getDetectionBoxRect() {
  const videoRect = video.getBoundingClientRect();
  const boxRect = detectionBox.getBoundingClientRect();
  const scaleX = video.videoWidth / videoRect.width;
  const scaleY = video.videoHeight / videoRect.height;
  const x = (boxRect.left - videoRect.left) * scaleX;
  const y = (boxRect.top - videoRect.top) * scaleY;
  const width = boxRect.width * scaleX;
  const height = boxRect.height * scaleY;
  return {x, y, width, height};
}

/* ===== FRAME CAPTURE ===== */
function grabFrame() {
  offscreenCtx.drawImage(video, 0, 0);
  return offscreenCtx.getImageData(0, 0, offscreen.width, offscreen.height);
}

/* ===== SIZE LOCK ===== */
// Hard-reject any blob whose radius differs from the locked radius by more than RADIUS_TOLERANCE.
// Returns true if the candidate passes (or if no radius is locked yet).
const RADIUS_TOLERANCE = 0.35; // 35% — tight enough to kill imposters, loose enough for perspective change
function passesSizeLock(radius) {
  if (lockedRadius === null) return true;
  const ratio = Math.abs(radius - lockedRadius) / lockedRadius;
  return ratio <= RADIUS_TOLERANCE;
}

/* ===== TEMPLATE MATCHING ===== */
// Build a normalised luminance patch centred on (cx, cy) with side = 2*r rounded to odd number.
function buildTemplate(frame, cx, cy, radius) {
  const side = Math.max(7, Math.round(radius * 2) | 1); // odd, min 7px
  const half = Math.floor(side / 2);
  const w = frame.width;
  const patch = new Float32Array(side * side);
  let sum = 0;
  for (let dy = -half; dy <= half; dy++) {
    for (let dx = -half; dx <= half; dx++) {
      const px = Math.round(cx) + dx;
      const py = Math.round(cy) + dy;
      if (px < 0 || px >= w || py < 0 || py >= frame.height) continue;
      const i = (py * w + px) * 4;
      const lum = (frame.data[i] + frame.data[i+1] + frame.data[i+2]) / 3;
      patch[(dy + half) * side + (dx + half)] = lum;
      sum += lum;
    }
  }
  // Zero-mean normalise
  const mean = sum / patch.length;
  let norm = 0;
  for (let i = 0; i < patch.length; i++) { patch[i] -= mean; norm += patch[i] * patch[i]; }
  norm = Math.sqrt(norm) || 1;
  for (let i = 0; i < patch.length; i++) patch[i] /= norm;
  return { patch, side };
}

// Normalised cross-correlation of the saved template against a region in frame centred on (cx, cy).
// Returns score in [-1, 1]. Values above NCC_THRESHOLD are considered a match.
const NCC_THRESHOLD = 0.55; // tuned for white golf ball; lower = more permissive
function nccScore(frame, cx, cy) {
  if (!ballTemplate) return 1; // no template yet → pass everything
  const { patch, side } = ballTemplate;
  const half = Math.floor(side / 2);
  const w = frame.width;
  const candidate = new Float32Array(side * side);
  let sum = 0;
  for (let dy = -half; dy <= half; dy++) {
    for (let dx = -half; dx <= half; dx++) {
      const px = Math.round(cx) + dx;
      const py = Math.round(cy) + dy;
      if (px < 0 || px >= w || py < 0 || py >= frame.height) continue;
      const i = (py * w + px) * 4;
      const lum = (frame.data[i] + frame.data[i+1] + frame.data[i+2]) / 3;
      candidate[(dy + half) * side + (dx + half)] = lum;
      sum += lum;
    }
  }
  const mean = sum / candidate.length;
  let norm = 0;
  for (let i = 0; i < candidate.length; i++) { candidate[i] -= mean; norm += candidate[i] * candidate[i]; }
  norm = Math.sqrt(norm) || 1;
  let dot = 0;
  for (let i = 0; i < patch.length; i++) dot += patch[i] * (candidate[i] / norm);
  return dot; // in [-1, 1]
}

/* ===== BALL DETECTION ===== */
function findBallInBox(refFrame, curFrame, boxRect, searchFullFrame = false) {
  const w = curFrame.width;
  const h = curFrame.height;
  let xMin, xMax, yMin, yMax;

  if (searchFullFrame) {
    if (USE_VERTICAL_STRIP) {
      const stripHeight = h * STRIP_WIDTH_PERCENT;
      const centerY = h / 2;
      xMin = 0; xMax = w;
      yMin = Math.max(0, Math.floor(centerY - stripHeight / 2));
      yMax = Math.min(h, Math.ceil(centerY + stripHeight / 2));
    } else if (lastKnownPosition) {
      const ROI_SIZE = missedFrames === 0 ? ROI_TRACKING : ROI_SEARCHING;
      xMin = Math.max(0, Math.floor(lastKnownPosition.x - ROI_SIZE));
      xMax = Math.min(w, Math.ceil(lastKnownPosition.x + ROI_SIZE));
      yMin = Math.max(0, Math.floor(lastKnownPosition.y - ROI_SIZE));
      yMax = Math.min(h, Math.ceil(lastKnownPosition.y + ROI_SIZE));
    } else {
      xMin = 0; xMax = w; yMin = 0; yMax = h;
    }
  } else {
    xMin = Math.max(0, Math.floor(boxRect.x));
    xMax = Math.min(w, Math.ceil(boxRect.x + boxRect.width));
    yMin = Math.max(0, Math.floor(boxRect.y));
    yMax = Math.min(h, Math.ceil(boxRect.y + boxRect.height));
  }

  const gridW = Math.max(1, Math.floor((xMax - xMin) / STEP));
  const gridH = Math.max(1, Math.floor((yMax - yMin) / STEP));
  const grid = new Uint8Array(gridW * gridH);

  let idx = 0;
  for (let gy = 0; gy < gridH; gy++) {
    const absY = yMin + gy * STEP;
    for (let gx = 0; gx < gridW; gx++, idx++) {
      const absX = xMin + gx * STEP;
      const frameIdx = (absY * w + absX) * 4;
      const curR = curFrame.data[frameIdx];
      const curG = curFrame.data[frameIdx + 1];
      const curB = curFrame.data[frameIdx + 2];
      const dr = Math.abs(curR - refFrame.data[frameIdx]);
      const dg = Math.abs(curG - refFrame.data[frameIdx + 1]);
      const db = Math.abs(curB - refFrame.data[frameIdx + 2]);
      const diff = (dr + dg + db) / 3;
      if (diff > DIFF_THR && isWhitePixel(curR, curG, curB)) {
        grid[idx] = 1;
      }
    }
  }

  const visited = new Uint8Array(gridW * gridH);
  let bestBlob = null;
  let bestScore = 0;

  for (let i = 0; i < grid.length; i++) {
    if (grid[i] === 0 || visited[i]) continue;
    const q = [i];
    visited[i] = 1;
    const comp = [];
    for (let qi = 0; qi < q.length; qi++) {
      const cur = q[qi];
      comp.push(cur);
      const gx = cur % gridW;
      const gy = Math.floor(cur / gridW);
      const n1 = cur - 1, n2 = cur + 1, n3 = cur - gridW, n4 = cur + gridW;
      if (gx > 0 && grid[n1] && !visited[n1]) { visited[n1] = 1; q.push(n1); }
      if (gx < gridW - 1 && grid[n2] && !visited[n2]) { visited[n2] = 1; q.push(n2); }
      if (gy > 0 && grid[n3] && !visited[n3]) { visited[n3] = 1; q.push(n3); }
      if (gy < gridH - 1 && grid[n4] && !visited[n4]) { visited[n4] = 1; q.push(n4); }
    }
    if (comp.length < MIN_BLOB_PX || comp.length > MAX_BLOB_PX) continue;
    let sx = 0, sy = 0;
    let minGx = Infinity, maxGx = -Infinity;
    let minGy = Infinity, maxGy = -Infinity;
    for (const ci of comp) {
      const gx = ci % gridW;
      const gy = Math.floor(ci / gridW);
      sx += gx; sy += gy;
      if (gx < minGx) minGx = gx;
      if (gx > maxGx) maxGx = gx;
      if (gy < minGy) minGy = gy;
      if (gy > maxGy) maxGy = gy;
    }
    const cxGrid = sx / comp.length;
    const cyGrid = sy / comp.length;
    const cx = xMin + cxGrid * STEP;
    const cy = yMin + cyGrid * STEP;
    const width = (maxGx - minGx + 1) * STEP;
    const height = (maxGy - minGy + 1) * STEP;
    const radius = Math.max(width, height) / 2;
    if (radius < MIN_RADIUS_PX || radius > MAX_RADIUS_PX) continue;
    const aspectRatio = width >= height ? width / height : height / width;
    if (aspectRatio > 1.6) continue;

    // ── IDEA 2: Size lock hard reject ──────────────────────────────────────
    if (!passesSizeLock(radius)) continue;

    const blobSize = comp.length;
    let score = blobSize * (blobSize / (width * height));

    // ── Template matching: score boost only (no hard reject — ball rotates) ──
    const ncc = nccScore(curFrame, cx, cy);
    if (ncc > NCC_THRESHOLD) score *= (ncc + 0.5); // reward matches, don't penalise rotation
    if (lastKnownPosition && searchFullFrame) {
      const dx = cx - lastKnownPosition.x;
      const dy = cy - lastKnownPosition.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      score = score / (1 + dist * 0.02);
      if (lockedRadius) {
        const sizeDiff = Math.abs(radius - lockedRadius);
        score = score / (1 + sizeDiff * 0.1);
      }
    }
    if (score > bestScore) {
      bestScore = score;
      bestBlob = { cx, cy, radius, size: blobSize };
    }
  }

  if (!bestBlob) return null;
  return { x: bestBlob.cx, y: bestBlob.cy, radius: bestBlob.radius };
}

/* ===== CAPTURE REFERENCE ===== */
function captureReference() {
  referenceFrame = grabFrame();
  updateStatus('Reference Captured\nPlace ball in box');
  btnStartTracking.disabled = false;
  btnReset.disabled = false;
  detectionBox.classList.add('detecting');
  showToast('Reference captured - ready to track');
}

/* ===== START TRACKING ===== */
function startTracking() {
  if (!referenceFrame) return;
  tracking = true;
  capturedFrames = [];
  kalmanFilter = new KalmanFilter();
  lastKnownPosition = null;
  lockedRadius = null;
  ballTemplate = null;
  templateSize = 0;
  missedFrames = 0;
  lastCaptureTime = 0;
  updateStatus('Tracking Active\nHorizontal strip mode');
  detectionBox.classList.remove('detecting');
  detectionBox.classList.add('locked');
  metricsPanel.classList.add('show');
  btnStartTracking.disabled = true;
  btnCaptureRef.disabled = true;
  showToast('Tracking started');
  startTrackingLoop();
}

/* ===== FRAME-SYNCED TRACKING LOOP ===== */
function startTrackingLoop() {
  if (!tracking) return;
  if ('requestVideoFrameCallback' in HTMLVideoElement.prototype) {
    trackingLoopId = video.requestVideoFrameCallback(frameCallback);
  } else {
    trackingLoopId = requestAnimationFrame(frameCallbackRAF);
  }
}

function frameCallback(now, metadata) {
  if (!tracking) return;
  captureBallFrame();
  if (tracking) {
    trackingLoopId = video.requestVideoFrameCallback(frameCallback);
  }
}

function frameCallbackRAF() {
  if (!tracking) return;
  const now = performance.now();
  if (now - lastCaptureTime >= MIN_CAPTURE_INTERVAL_MS) {
    captureBallFrame();
  }
  if (tracking) {
    trackingLoopId = requestAnimationFrame(frameCallbackRAF);
  }
}

/* ===== CAPTURE BALL FRAME ===== */
function captureBallFrame() {
  if (!tracking) return;
  const now = performance.now();
  lastCaptureTime = now;
  const currentFrame = grabFrame();
  const boxRect = getDetectionBoxRect();
  const ballPos = findBallInBox(referenceFrame, currentFrame, boxRect, true);

  if (ballPos) {
    missedFrames = 0;
    let finalPos;
    if (USE_RAW_DETECTION) {
      finalPos = { x: ballPos.x, y: ballPos.y };
      if (kalmanFilter) kalmanFilter.update(ballPos);
    } else {
      finalPos = kalmanFilter.update(ballPos);
    }
    lastKnownPosition = finalPos;
    if (lockedRadius === null) {
      lockedRadius = ballPos.radius;
      // ── Capture template on very first detection ───────────────────────
      ballTemplate = buildTemplate(currentFrame, ballPos.x, ballPos.y, ballPos.radius);
      templateSize = ballTemplate.side;
    } else {
      // Gradually update radius (50/50 blend) but keep original template —
      // the ball appearance doesn't change, only perspective slightly.
      lockedRadius = 0.5 * lockedRadius + 0.5 * ballPos.radius;
    }
    capturedFrames.push({ x: finalPos.x, y: finalPos.y, radius: lockedRadius, timestamp: performance.now() });
    updateMetrics(capturedFrames.length, null, null);
    if (capturedFrames.length >= 3) {
      const trajectory = calculateTrajectory();
      if (trajectory) updateMetrics(capturedFrames.length, trajectory.angle, trajectory.direction);
    }
  } else {
    missedFrames++;
    if (missedFrames <= MAX_MISSED_FRAMES && kalmanFilter && kalmanFilter.initialized) {
      const predicted = kalmanFilter.predict();
      lastKnownPosition = predicted;
      capturedFrames.push({ x: predicted.x, y: predicted.y, radius: lockedRadius || 20, timestamp: performance.now(), predicted: true });
      updateMetrics(capturedFrames.length, null, null);
      if (capturedFrames.length >= 3) {
        const trajectory = calculateTrajectory();
        if (trajectory) updateMetrics(capturedFrames.length, trajectory.angle, trajectory.direction);
      }
    } else if (missedFrames > MAX_MISSED_FRAMES) {
      // Ball has left frame — shot is done, stop tracking
      updateStatus('Shot complete\nBall exited frame');
      showToast('🏌️ Shot complete — press RESET for next shot');
      tracking = false;
      if (trackingLoopId !== null) {
        if ('requestVideoFrameCallback' in HTMLVideoElement.prototype) {
          video.cancelVideoFrameCallback(trackingLoopId);
        } else {
          cancelAnimationFrame(trackingLoopId);
        }
        trackingLoopId = null;
      }
      btnReset.disabled = false;
    }
  }
}

/* ===== CALCULATE TRAJECTORY ===== */
function calculateTrajectory() {
  if (capturedFrames.length < 3) return null;
  const first = capturedFrames[0];
  const last = capturedFrames[capturedFrames.length - 1];
  const dx = last.x - first.x;
  const dy = -(last.y - first.y);
  const angleRad = Math.atan2(dy, dx);
  let angleDeg = angleRad * (180 / Math.PI);
  if (angleDeg > 90) angleDeg = 90;
  if (angleDeg < -90) angleDeg = -90;
  const direction = angleDeg > 2 ? "Right" : angleDeg < -2 ? "Left" : "Straight";
  return { angle: angleDeg, direction: direction };
}

/* ===== DRAWING ===== */
function drawFrame() {
  ctx.clearRect(0, 0, overlay.width, overlay.height);

  if (detectionBox && !tracking) {
    const boxRect = getDetectionBoxRect();
    ctx.save();
    ctx.strokeStyle = 'rgba(0, 255, 136, 0.6)';
    ctx.lineWidth = 3;
    ctx.strokeRect(boxRect.x, boxRect.y, boxRect.width, boxRect.height);
    const cx = boxRect.x + boxRect.width / 2;
    const cy = boxRect.y + boxRect.height / 2;
    ctx.beginPath();
    ctx.moveTo(cx, boxRect.y); ctx.lineTo(cx, boxRect.y + boxRect.height);
    ctx.moveTo(boxRect.x, cy); ctx.lineTo(boxRect.x + boxRect.width, cy);
    ctx.stroke();
    ctx.restore();
  }

  if (tracking || capturedFrames.length > 0) {
    const centerY = overlay.height / 2;
    ctx.strokeStyle = 'rgba(231, 34, 42, 0.8)';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(0, centerY); ctx.lineTo(overlay.width, centerY);
    ctx.stroke();

    const centerX = overlay.width / 2;
    ctx.beginPath();
    ctx.moveTo(centerX, 0); ctx.lineTo(centerX, overlay.height);
    ctx.stroke();

    if (USE_VERTICAL_STRIP) {
      const stripHeight = overlay.height * STRIP_WIDTH_PERCENT;
      const topBound = centerY - stripHeight / 2;
      const bottomBound = centerY + stripHeight / 2;
      ctx.strokeStyle = 'rgba(0, 255, 100, 0.6)';
      ctx.lineWidth = 2;
      ctx.setLineDash([10, 5]);
      ctx.beginPath();
      ctx.moveTo(0, topBound); ctx.lineTo(overlay.width, topBound);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(0, bottomBound); ctx.lineTo(overlay.width, bottomBound);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = 'rgba(0, 255, 100, 0.9)';
      ctx.font = 'bold 14px "Avenir", sans-serif';
      ctx.fillText('TRACKING ZONE', 20, topBound - 10);
    }
  }

  if (capturedFrames.length > 0) {
    if (capturedFrames.length > 1) {
      ctx.strokeStyle = 'rgba(0, 255, 100, 0.9)';
      ctx.lineWidth = 4;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.beginPath();
      ctx.moveTo(capturedFrames[0].x, capturedFrames[0].y);
      for (let i = 1; i < capturedFrames.length; i++) {
        ctx.lineTo(capturedFrames[i].x, capturedFrames[i].y);
      }
      ctx.stroke();
    }

    for (let i = 0; i < capturedFrames.length; i++) {
      const frame = capturedFrames[i];
      const opacity = 0.3 + (i / capturedFrames.length) * 0.2;
      if (frame.predicted) {
        ctx.fillStyle = `rgba(255, 255, 100, ${opacity})`;
        ctx.strokeStyle = `rgba(200, 200, 100, ${opacity * 0.8})`;
      } else {
        ctx.fillStyle = `rgba(255, 255, 255, ${opacity})`;
        ctx.strokeStyle = `rgba(200, 200, 200, ${opacity * 0.8})`;
      }
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(frame.x, frame.y, frame.radius, 0, Math.PI * 2);
      ctx.fill(); ctx.stroke();
      ctx.fillStyle = 'rgba(0, 255, 100, 0.9)';
      ctx.beginPath();
      ctx.arc(frame.x, frame.y, 3, 0, Math.PI * 2);
      ctx.fill();
    }

    const latest = capturedFrames[capturedFrames.length - 1];
    ctx.strokeStyle = 'rgba(255, 255, 0, 1.0)';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(latest.x, latest.y, latest.radius + 5, 0, Math.PI * 2);
    ctx.stroke();
  }
}

/* ===== MAIN RENDER LOOP ===== */
function renderLoop() {
  requestAnimationFrame(renderLoop);
  if (!video.videoWidth || !overlay.width) return;
  drawFrame();
}

/* ===== RESET ===== */
function reset() {
  tracking = false;
  if (trackingLoopId !== null) {
    if ('requestVideoFrameCallback' in HTMLVideoElement.prototype) {
      video.cancelVideoFrameCallback(trackingLoopId);
    } else {
      cancelAnimationFrame(trackingLoopId);
    }
    trackingLoopId = null;
  }
  referenceFrame = null;
  capturedFrames = [];
  kalmanFilter = null;
  lastKnownPosition = null;
  lockedRadius = null;
  ballTemplate = null;
  templateSize = 0;
  missedFrames = 0;
  lastCaptureTime = 0;
  ctx.clearRect(0, 0, overlay.width, overlay.height);
  detectionBox.classList.remove('detecting', 'locked');
  metricsPanel.classList.remove('show');
  btnCaptureRef.disabled = false;
  btnStartTracking.disabled = true;
  updateMetrics(0, null, null);
  updateStatus('Ready to Capture\nPress CAPTURE REFERENCE');
  showToast('System reset');
}

/* ===== EVENT LISTENERS ===== */
btnStartCamera.addEventListener('click', startCamera);
btnCaptureRef.addEventListener('click', captureReference);
btnStartTracking.addEventListener('click', startTracking);
btnReset.addEventListener('click', reset);

/* ===== INIT ===== */
createDetectionBox();
updateStatus('Ready\nPress START CAMERA');
renderLoop();
</script>
