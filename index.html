                    </div>
                `;
                this.puttCompleteEl.classList.add('show');
                // Light haptic feedback on supported devices
                try { if (navigator.vibrate) navigator.vibrate(40); } catch (_) { }
                clearTimeout(this._puttHideT);
                this._puttHideT = setTimeout(() => {
                    this.puttCompleteEl.classList.remove('show');
                }, 1200);
            }

            // Draw enhanced path overlay onto preview canvas using returned analysis coordinates
            drawPathOverlay(points, analysisSize) {
                if (!analysisSize) return;
                const sx = this.previewCanvas.width / analysisSize.w;
                const sy = this.previewCanvas.height / analysisSize.h;
                this.previewCtx.save();
                
                // Enhanced styling for real-time overlay
                this.previewCtx.lineWidth = 5;
                this.previewCtx.strokeStyle = '#dc2626'; // Brand red color
                this.previewCtx.fillStyle = '#dc2626';
                this.previewCtx.lineCap = 'round';
                this.previewCtx.lineJoin = 'round';
                this.previewCtx.globalAlpha = 0.9;
                
                // Draw smooth arc line in one direction
                this.previewCtx.beginPath();
                this.previewCtx.moveTo(points[0].x * sx, points[0].y * sy);
                
                // Use simple lineTo for smooth single-direction arc
                for (let i = 1; i < points.length; i++) {
                    this.previewCtx.lineTo(points[i].x * sx, points[i].y * sy);
                }
                
                this.previewCtx.stroke();
                
                // Enhanced start/end markers
                const s = points[0], e = points[points.length - 1];
                this.previewCtx.globalAlpha = 1.0;
                
                // Start marker (circle with glow effect)
                this.previewCtx.shadowColor = '#dc2626';
                this.previewCtx.shadowBlur = 8;
                this.previewCtx.beginPath();
                this.previewCtx.arc(s.x * sx, s.y * sy, 8, 0, Math.PI * 2);
                this.previewCtx.fill();
                
                // End marker (square with glow effect)
                this.previewCtx.fillRect(
                    (e.x * sx) - 6, 
                    (e.y * sy) - 6, 
                    12, 
                    12
                );
                
                // Reset shadow
                this.previewCtx.shadowBlur = 0;
                
                this.previewCtx.restore();
            }

            // Draw stickers (cropped object images) along the path
            async drawStickerOverlay(points, images, analysisSize) {
                if (!analysisSize || !images || !images.length) return;
                const sx = this.previewCanvas.width / analysisSize.w;
                const sy = this.previewCanvas.height / analysisSize.h;
                const ctx = this.previewCtx;
                // Draw ALL stickers - no throttling
                const step = 1;
                for (let i = 0, idx = 0; i < points.length && idx < images.length; i += step, idx += step) {
                    const imgSrc = images[idx];
                    if (!imgSrc) continue;
                    const px = points[i].x * sx;
                    const py = points[i].y * sy;
                    try {
                        const img = await this.loadImage(imgSrc);
                        // Draw centered at point, clamp size for readability
                        const maxDim = Math.min(this.previewCanvas.width, this.previewCanvas.height) * 0.12;
                        const scale = Math.min(maxDim / Math.max(img.width, img.height), 1.0);
                        const w = Math.max(16, img.width * scale);
                        const h = Math.max(16, img.height * scale);
                        const x = Math.round(px - w / 2);
                        const y = Math.round(py - h / 2);
                        if (x + w > 0 && y + h > 0 && x < this.previewCanvas.width && y < this.previewCanvas.height) {
                            ctx.save();
                            ctx.globalAlpha = 0.5;
                            ctx.drawImage(img, x, y, w, h);
                            ctx.restore();
                        }
                    } catch {}
                }
            }

            // Compose and return a dataURL by drawing stickers for ALL putts on the last frame
            async composeResultFromAllPutts(allPutts) {
                if (!this.previewCanvas) return null;
                // clone current preview into an offscreen canvas
                const off = document.createElement('canvas');
                off.width = this.previewCanvas.width;
                off.height = this.previewCanvas.height;
                const ctx = off.getContext('2d');
                ctx.drawImage(this.previewCanvas, 0, 0);
                const stepGlobal = 6; // draw every 6th detection for modal image (increased sticker count)
                const maxStickers = 60;
                for (const putt of (allPutts || [])) {
                    const pts = putt.path_points || [];
                    const imgs = putt.path_images || [];
                    const step = stepGlobal;
                    for (let i = 0, idx = 0; i < pts.length && idx < imgs.length; i += step, idx += step) {
                        const imgSrc = imgs[idx];
                        if (!imgSrc) continue;
                        try {
                            const img = await this.loadImage(imgSrc);
                            const px = pts[i].x * (off.width / (this.previewCanvas.width));
                            const py = pts[i].y * (off.height / (this.previewCanvas.height));
                            const maxDim = Math.min(off.width, off.height) * 0.12;
                            const scale = Math.min(maxDim / Math.max(img.width, img.height), 1.0);
                            const w = Math.max(16, img.width * scale);
                            const h = Math.max(16, img.height * scale);
                            const x = Math.round(px - w / 2);
                            const y = Math.round(py - h / 2);
                            ctx.save();
                            ctx.save();
                            ctx.globalAlpha = 0.5;
                            ctx.drawImage(img, x, y, w, h);
                                ctx.restore();
                            ctx.restore();
                        } catch {}
                    }
                }
                return off.toDataURL('image/png');
            }

            // Compose an image with ALL putter positions drawn as cropped putter images across all putts
            async composeDotsImageFromAllPutts(allPutts, analysisSize, baseSrc = null) {
                if (!analysisSize) return null;
                const off = document.createElement('canvas');
                // Prefer live video dimensions (most reliable on mobile), then preview, then analysisSize
                const w = (this.video && this.video.videoWidth) || (this.previewCanvas && this.previewCanvas.width) || (analysisSize && analysisSize.w) || 0;
                const h = (this.video && this.video.videoHeight) || (this.previewCanvas && this.previewCanvas.height) || (analysisSize && analysisSize.h) || 0;
                if (!w || !h) return null;
                off.width = w;
                off.height = h;
                const ctx = off.getContext('2d');
                // base layer: FORCE live video frame first (works best on phones), then previewCanvas, then baseSrc
                let backgroundDrawn = false;
                
                // 1) Live video frame (most reliable on mobile)
                if (this.video && this.video.videoWidth > 0) {
                    try {
                        const tempCanvas = document.createElement('canvas');
                        tempCanvas.width = off.width;
                        tempCanvas.height = off.height;
                        const tempCtx = tempCanvas.getContext('2d');
                        tempCtx.drawImage(this.video, 0, 0, off.width, off.height);
                        ctx.drawImage(tempCanvas, 0, 0);
                        backgroundDrawn = true;
                    } catch {}
                }

                // 2) Preview canvas
                if (!backgroundDrawn && this.previewCanvas && this.previewCanvas.width > 0) {
                    try {
                        ctx.drawImage(this.previewCanvas, 0, 0);
                        backgroundDrawn = true;
                    } catch {}
                }

                // 3) Provided base image (if any)
                if (!backgroundDrawn && baseSrc && typeof baseSrc === 'string' && /^(data:|blob:|https?:)/.test(baseSrc)) {
                    try {
                        const baseImg = await this.loadImage(baseSrc);
                        ctx.drawImage(baseImg, 0, 0, off.width, off.height);
                        backgroundDrawn = true;
                    } catch (e) {
                        console.warn('Failed to load baseSrc image:', e);
                    }
                }
                
                // If still no background, draw a dark background
                if (!backgroundDrawn) {
                    ctx.fillStyle = '#1a1a1a';
                    ctx.fillRect(0, 0, off.width, off.height);
                }
                const sx = off.width / analysisSize.w;
                const sy = off.height / analysisSize.h;
                
                // draw cropped putter images instead of dots
                ctx.save();
                
                // Find the longest putt (most significant) and collect all sticker centers
                let longestPutt = null;
                let maxPoints = 0;
                
                // First, draw all stickers and find the longest putt
                for (const putt of (allPutts || [])) {
                    const pts = putt.path_points || [];
                    if (pts.length > maxPoints) {
                        maxPoints = pts.length;
                        longestPutt = putt;
                    }
                    
                    const imgs = putt.path_images || [];
                    const boxes = putt.path_boxes || [];
                    const step = 6; // Increased sticker density (was 8)
                    
                    // Draw every 6th point for modal image (increased sticker count)
                    for (let i = 0; i < pts.length; i += step) {
                        const point = pts[i];
                        const imgSrc = imgs[i];
                        const box = boxes[i];
                        
                        if (imgSrc && box) {
                            try {
                                const img = await this.loadImage(imgSrc);
                                const px = point.x * sx;
                                const py = point.y * sy;
                                
                                // Scale the cropped putter image
                                const maxSize = Math.min(off.width, off.height) * 0.08;
                                const scale = Math.min(maxSize / Math.max(img.width, img.height), 1.0);
                                const w = img.width * scale;
                                const h = img.height * scale;
                                
                                // Draw with slight transparency and border
                                ctx.globalAlpha = 0.5;
                                ctx.drawImage(img, px - w/2, py - h/2, w, h);
                                
                            } catch (e) {
                                // Fallback to dot if image fails to load
                                const px = point.x * sx;
                                const py = point.y * sy;
                                
                                ctx.fillStyle = 'rgba(34,197,94,0.95)';
                                const r = Math.max(3, Math.min(off.width, off.height) * 0.004);
                                ctx.beginPath();
                                ctx.arc(px, py, r, 0, Math.PI * 2);
                                ctx.fill();
                            }
                        } else {
                            // Fallback to dot if no image data
                            const px = point.x * sx;
                            const py = point.y * sy;
                            
                            ctx.fillStyle = 'rgba(34,197,94,0.95)';
                            const r = Math.max(3, Math.min(off.width, off.height) * 0.004);
                            ctx.beginPath();
                            ctx.arc(px, py, r, 0, Math.PI * 2);
                            ctx.fill();
                        }
                    }
                }
                
                // Draw single enhanced red arc line for the longest/most significant putt
                if (longestPutt && longestPutt.path_points && longestPutt.path_points.length > 2) {
                    const pts = longestPutt.path_points;
                    const step = Math.max(1, Math.floor(pts.length / 30)); // Adaptive step size for smoother curve
                    const arcCenters = [];
                    
                    // Collect centers with adaptive sampling and ensure proper ordering
                    for (let i = 0; i < pts.length; i += step) {
                        const point = pts[i];
                        const px = point.x * sx;
                        const py = point.y * sy;
                        arcCenters.push({ x: px, y: py, originalIndex: i });
                    }
                    
                    // Sort points by their original index to ensure proper sequence
                    arcCenters.sort((a, b) => a.originalIndex - b.originalIndex);
                    
                    // Remove duplicate points (same x,y coordinates)
                    const uniqueCenters = [];
                    for (let i = 0; i < arcCenters.length; i++) {
                        const current = arcCenters[i];
                        const prev = uniqueCenters[uniqueCenters.length - 1];
                        if (!prev || Math.abs(current.x - prev.x) > 2 || Math.abs(current.y - prev.y) > 2) {
                            uniqueCenters.push({ x: current.x, y: current.y });
                        }
                    }
                    arcCenters.length = 0;
                    arcCenters.push(...uniqueCenters);
                    
                    // Draw single smooth arc line
                    if (arcCenters.length > 2) {
                        ctx.save();
                        
                        // Enhanced styling for single arc
                        ctx.globalAlpha = 0.95;
                        ctx.strokeStyle = '#dc2626'; // Brand red color
                        ctx.lineWidth = 4;
                        ctx.lineCap = 'round';
                        ctx.lineJoin = 'round';
                        
                        // Draw smooth arc line in one direction
                        ctx.beginPath();
                        ctx.moveTo(arcCenters[0].x, arcCenters[0].y);
                        
                        // Use simple lineTo for smooth single-direction arc
                        for (let i = 1; i < arcCenters.length; i++) {
                            ctx.lineTo(arcCenters[i].x, arcCenters[i].y);
                        }
                        
                        ctx.stroke();
                        
                        // Add start and end markers
                        ctx.fillStyle = '#dc2626';
                        ctx.globalAlpha = 1.0;
                        
                        // Start marker (circle)
                        ctx.beginPath();
                        ctx.arc(arcCenters[0].x, arcCenters[0].y, 6, 0, Math.PI * 2);
                        ctx.fill();
                        
                        // End marker (square)
                        const endX = arcCenters[arcCenters.length - 1].x;
                        const endY = arcCenters[arcCenters.length - 1].y;
                        ctx.fillRect(endX - 4, endY - 4, 8, 8);
                        
                        ctx.restore();
                    }
                }
                ctx.restore();
                return off.toDataURL('image/png');
            }

            // Compose an image with cropped putter images from a single list of points
            async composeDotsImageFromPoints(points, analysisSize, images = null, boxes = null, baseSrc = null, drawArc = true) {
                if (!analysisSize || !Array.isArray(points) || points.length === 0) return null;
                const off = document.createElement('canvas');
                // Prefer live video dimensions (most reliable on mobile), then preview, then analysisSize
                const w = (this.video && this.video.videoWidth) || (this.previewCanvas && this.previewCanvas.width) || (analysisSize && analysisSize.w) || 0;
                const h = (this.video && this.video.videoHeight) || (this.previewCanvas && this.previewCanvas.height) || (analysisSize && analysisSize.h) || 0;
                if (!w || !h) return null;
                off.width = w;
                off.height = h;
                const ctx = off.getContext('2d');
                // base layer: FORCE live video frame first (works best on phones), then previewCanvas, then baseSrc
                let backgroundDrawn = false;
                
                // 1) Live video frame (most reliable on mobile)
                if (this.video && this.video.videoWidth > 0) {
                    try {
                        const tempCanvas = document.createElement('canvas');
                        tempCanvas.width = off.width;
                        tempCanvas.height = off.height;
                        const tempCtx = tempCanvas.getContext('2d');
                        tempCtx.drawImage(this.video, 0, 0, off.width, off.height);
                        ctx.drawImage(tempCanvas, 0, 0);
                        backgroundDrawn = true;
                    } catch {}
                }

                // 2) Preview canvas
                if (!backgroundDrawn && this.previewCanvas && this.previewCanvas.width > 0) {
                    try {
                        ctx.drawImage(this.previewCanvas, 0, 0);
                        backgroundDrawn = true;
                    } catch {}
                }

                // 3) Provided base image (if any)
                if (!backgroundDrawn && baseSrc && typeof baseSrc === 'string' && /^(data:|blob:|https?:)/.test(baseSrc)) {
                    try {
                        const baseImg = await this.loadImage(baseSrc);
                        ctx.drawImage(baseImg, 0, 0, off.width, off.height);
                        backgroundDrawn = true;
                    } catch (e) {
                        console.warn('Failed to load baseSrc image:', e);
                    }
                }
                
                // If still no background, draw a dark background
                if (!backgroundDrawn) {
                    ctx.fillStyle = '#1a1a1a';
                    ctx.fillRect(0, 0, off.width, off.height);
                }
                const sx = off.width / analysisSize.w;
                const sy = off.height / analysisSize.h;
                
                ctx.save();
                // Collect sticker centers for red arc line
                const stickerCenters = [];
                
                // Draw every 6th point for modal image (increased sticker count)
                const step = 6; // Increased sticker density (was 8)
                for (let i = 0; i < points.length; i += step) {
                    const point = points[i];
                    const imgSrc = images && images[i];
                    const box = boxes && boxes[i];
                    
                    if (imgSrc && box) {
                        try {
                            const img = await this.loadImage(imgSrc);
                            const px = point.x * sx;
                            const py = point.y * sy;
                            
                            // Store center for arc line
                            stickerCenters.push({ x: px, y: py });
                            
                            // Scale the cropped putter image
                            const maxSize = Math.min(off.width, off.height) * 0.1;
                            const scale = Math.min(maxSize / Math.max(img.width, img.height), 1.0);
                            const w = img.width * scale;
                            const h = img.height * scale;
                            
                            // Draw with slight transparency and border
                            ctx.save();
                            ctx.globalAlpha = 0.5;
                            ctx.drawImage(img, px - w/2, py - h/2, w, h);
                            ctx.restore();
                            
                            // Border intentionally removed per requirement: stickers have no boxes
                        } catch (e) {
                            // Fallback to dot if image fails to load
                            const px = point.x * sx;
                            const py = point.y * sy;
                            
                            // Store center for arc line even for fallback dots
                            stickerCenters.push({ x: px, y: py });
                            
                            ctx.fillStyle = 'rgba(34,197,94,0.95)';
                            const r = Math.max(3, Math.min(off.width, off.height) * 0.004);
                            ctx.beginPath();
                            ctx.arc(px, py, r, 0, Math.PI * 2);
                            ctx.fill();
                        }
                    } else {
                        // Fallback to dot if no image data
                        const px = point.x * sx;
                        const py = point.y * sy;
                        
                        // Store center for arc line even for fallback dots
                        stickerCenters.push({ x: px, y: py });
                        
                        ctx.fillStyle = 'rgba(34,197,94,0.95)';
                        const r = Math.max(3, Math.min(off.width, off.height) * 0.004);
                        ctx.beginPath();
                        ctx.arc(px, py, r, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
                
                // Sort and deduplicate sticker centers for smooth arc
                stickerCenters.sort((a, b) => {
                    // Sort by Y coordinate first (top to bottom), then by X coordinate
                    if (Math.abs(a.y - b.y) > 5) return a.y - b.y;
                    return a.x - b.x;
                });
                
                // Remove duplicate points
                const uniqueStickerCenters = [];
                for (let i = 0; i < stickerCenters.length; i++) {
                    const current = stickerCenters[i];
                    const prev = uniqueStickerCenters[uniqueStickerCenters.length - 1];
                    if (!prev || Math.abs(current.x - prev.x) > 3 || Math.abs(current.y - prev.y) > 3) {
                        uniqueStickerCenters.push(current);
                    }
                }
                
                // Draw enhanced red arc line connecting sticker centers (only if drawArc is true)
                if (drawArc && uniqueStickerCenters.length > 1) {
                    ctx.save();
                    
                    // Enhanced styling for single putt
                    ctx.globalAlpha = 0.95;
                    ctx.strokeStyle = '#dc2626'; // Brand red color
                    ctx.lineWidth = 4;
                    ctx.lineCap = 'round';
                    ctx.lineJoin = 'round';
                    
                    // Draw smooth arc line in one direction
                    ctx.beginPath();
                    ctx.moveTo(uniqueStickerCenters[0].x, uniqueStickerCenters[0].y);
                    
                    // Use simple lineTo for smooth single-direction arc
                    for (let i = 1; i < uniqueStickerCenters.length; i++) {
                        ctx.lineTo(uniqueStickerCenters[i].x, uniqueStickerCenters[i].y);
                    }
                    
                    ctx.stroke();
                    
                    // Add start and end markers
                    ctx.fillStyle = '#dc2626';
                    ctx.globalAlpha = 1.0;
                    
                    // Start marker (circle)
                    ctx.beginPath();
                    ctx.arc(uniqueStickerCenters[0].x, uniqueStickerCenters[0].y, 6, 0, Math.PI * 2);
                    ctx.fill();
                    
                    // End marker (square)
                    const endX = uniqueStickerCenters[uniqueStickerCenters.length - 1].x;
                    const endY = uniqueStickerCenters[uniqueStickerCenters.length - 1].y;
                    ctx.fillRect(endX - 4, endY - 4, 8, 8);
                    
                    // Add "Putt Path" label
                    ctx.fillStyle = '#ffffff';
                    ctx.strokeStyle = '#dc2626';
                    ctx.lineWidth = 2;
                    ctx.font = 'bold 12px Avenir';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    
                    const labelX = uniqueStickerCenters[Math.floor(uniqueStickerCenters.length / 2)].x;
                    const labelY = uniqueStickerCenters[Math.floor(uniqueStickerCenters.length / 2)].y - 15;
                    
                    ctx.strokeText('Putt Path', labelX, labelY);
                    ctx.fillText('Putt Path', labelX, labelY);
                    
                    ctx.restore();
                }
                
                ctx.restore();
                return off.toDataURL('image/jpeg', 0.9);
            }

            loadImage(src) {
                return new Promise((resolve, reject) => {
                    const img = new Image();
                    img.onload = () => resolve(img);
                    img.onerror = reject;
                    img.src = src;
                });
            }

            clearOverlay() {
                // redraw live frame to clear overlay next iteration; here we just clear
                this.previewCtx.clearRect(0, 0, this.previewCanvas.width, this.previewCanvas.height);
                // Redraw the reference line immediately after clearing
                this.drawReferenceLine();
            }

            // Draw enforced reference line to help users position their putter
            drawReferenceLine() {
                if (!this.previewCanvas) return;
                
                const ctx = this.previewCtx;
                const canvas = this.previewCanvas;
                
                // Fixed reference line - always vertical, centered
                const centerX = canvas.width * 0.5;
                const startY = 50;
                const endY = canvas.height - 50;
                const centerY = canvas.height / 2;
                
                ctx.save();
                
                // Draw main reference line - RED DOTTED
                ctx.strokeStyle = 'rgba(220, 38, 38, 0.9)'; // Red color
                ctx.lineWidth = 3;
                ctx.setLineDash([15, 10]); // Dotted pattern
                
                ctx.beginPath();
                ctx.moveTo(centerX, startY);
                ctx.lineTo(centerX, endY);
                ctx.stroke();
                
                // Draw center marker - prominent red circle
                ctx.setLineDash([]);
                ctx.strokeStyle = 'rgba(220, 38, 38, 1.0)';
                ctx.fillStyle = 'rgba(220, 38, 38, 0.8)';
                ctx.lineWidth = 4;
                
                // Center circle - larger and more prominent
                ctx.beginPath();
                ctx.arc(centerX, centerY, 12, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();
                
                // Add inner white dot for better visibility
                ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
                ctx.beginPath();
                ctx.arc(centerX, centerY, 6, 0, Math.PI * 2);
                ctx.fill();
                
                // Add instruction text
                ctx.fillStyle = 'rgba(255, 255, 255, 0.95)';
                ctx.font = 'bold 16px system-ui';
                ctx.textAlign = 'center';
                ctx.strokeStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.lineWidth = 3;
                ctx.strokeText('POSITION PUTTER HERE', centerX, centerY - 25);
                ctx.fillText('POSITION PUTTER HERE', centerX, centerY - 25);
                
                // Add start and end markers - red
                ctx.strokeStyle = 'rgba(220, 38, 38, 0.8)';
                ctx.lineWidth = 3;
                ctx.setLineDash([]);
                
                // Start marker (top)
                ctx.beginPath();
                ctx.moveTo(centerX - 20, startY);
                ctx.lineTo(centerX + 20, startY);
                ctx.stroke();
                
                // End marker (bottom)
                ctx.beginPath();
                ctx.moveTo(centerX - 20, endY);
                ctx.lineTo(centerX + 20, endY);
                ctx.stroke();
                
                // Add directional arrows
                ctx.fillStyle = 'rgba(220, 38, 38, 0.8)';
                ctx.font = 'bold 12px system-ui';
                ctx.textAlign = 'center';
                ctx.fillText('↑', centerX, startY - 10);
                ctx.fillText('↓', centerX, endY + 15);
                
                ctx.restore();
            }

            stop() {
                this.running = false;
                if (this.stream) {
                    this.stream.getTracks().forEach(t => t.stop());
                    this.stream = null;
                }
                document.getElementById('stopBtn').disabled = true;
                document.getElementById('startBtn').disabled = false;
                this.setStatus('Stopped', 'waiting');
                
                // Redraw reference line when stopping
                this.drawReferenceLine();
            }

            // ----- Results Modal -----
            async showSessionResults(data) {
                if (!this.resultsModal) return;
                
                // Clear any existing overlays before showing results
                if (this.previewCanvas) {
                    this.clearOverlay();
                }
                
                // Normalize and capture a reliable base image for composition
                let baseSrc = null;
                try {
                    if (data && typeof data.result_image === 'string' && data.result_image.length > 0) {
                        baseSrc = String(data.result_image).replace(/^["']+|["']+$/g, '');
                    }
                    if (!baseSrc && data && typeof data.first_frame_image === 'string' && data.first_frame_image.length > 0) {
                        baseSrc = String(data.first_frame_image).replace(/^["']+|["']+$/g, '');
                    }
                    // If still not available, capture current preview or video frame
                    if (!baseSrc) {
                        if (this.previewCanvas && this.previewCanvas.width > 0) {
                            baseSrc = this.previewCanvas.toDataURL('image/png');
                        } else if (this.video && this.video.videoWidth > 0) {
                            const tempCanvas = document.createElement('canvas');
                            tempCanvas.width = this.video.videoWidth;
                            tempCanvas.height = this.video.videoHeight;
                            const tempCtx = tempCanvas.getContext('2d');
                            tempCtx.drawImage(this.video, 0, 0);
                            baseSrc = tempCanvas.toDataURL('image/png');
                        }
                    }
                } catch {}

                const putts = data.putts || [];
                const total = putts.length;
                const avgArc = data.average_arc_type || '—';
                const avgConf = data.average_confidence != null ? (data.average_confidence * 100).toFixed(1) + '%' : '—';

                // Left panel: chart-like summary and per-putt details (angles removed)
                const leftParts = [];
                leftParts.push(`<div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:8px;">
                    <div style="font-weight:800; font-size:16px; color:#fff;">Overview</div>
                    <span class="badge badge-excellent">Target 3 • Count ${total}</span>
                </div>`);
                leftParts.push(`<div class="metric"><span class="name">Average Arc</span><span class="value">${avgArc}</span></div>`);
                leftParts.push(`<div class="metric"><span class="name">Average Confidence</span><span class="value">${avgConf}</span></div>`);

                // Build per-putt mini-cards (angles removed)
                for (let i = 0; i < putts.length; i++) {
                    const p = putts[i];
                    const confPct = p.confidence != null ? (p.confidence * 100).toFixed(0) : 0;
                    const pts = p.point_count || 0;
                    leftParts.push(`<div style="margin-top:12px; border-top:1px solid #1f2937; padding-top:10px;">
                        <div style="display:flex; align-items:center; justify-content:space-between;">
                            <div style="font-weight:800; color:#e5e7eb;">Putt ${i + 1}</div>
                            <span class="badge badge-good">${this.formatArcType(p.arc_type)}</span>
                        </div>
                        <div class="metric"><span class="name">Confidence</span><span class="value">${confPct}%</span></div>
                        <div class="bar"><span style="width:${Math.min(100, Math.max(0, confPct))}%"></span></div>
                        <div class="metric"><span class="name">Points</span><span class="value">${pts}</span></div>
                        ${p.reasoning ? `<div style=\"margin-top:6px; color:#94a3b8; font-size:12px\">${p.reasoning}</div>` : ''}
                    </div>`);
                }

                this.resultsLeft.innerHTML = leftParts.join('');

                // Right panel: remove angle gauges; keep only the result image and summary chips
                const imgSrc = null; // First frame removed from UI
                
                this.resultsRight.innerHTML = `
                    <div style=\"font-weight:800; color:#e5e7eb; margin-bottom:8px;\">Result</div>
                    
                    ${data.result_image ? `<div style="margin-top:12px"><div class="metric"><span class="name">Result Image</span><span class="value"></span></div><img class="result-frame" alt="Result frame" style="width:100%; border-radius:8px; border:1px solid #1f2937;"/></div>` : ''}
                    <div style=\"margin-top:10px; display:flex; gap:8px; flex-wrap:wrap;\">
                        <span class=\"badge badge-excellent\">Average: ${this.formatArcType(avgArc)}</span>
                        <span class=\"badge badge-good\">Putts ${total}/3</span>
                    </div>
                `;
                
                if (data.result_image) {
                    const rEl = this.resultsRight.querySelector('img.result-frame');
                    if (rEl) {
                        rEl.src = String(data.result_image).replace(/^[\"']+|[\"']+$/g, '');
                    }
                }
                // ALWAYS generate dots image - prioritize all putts, fallback to single putt, then raw frame
                let dotsImage = null;
                
                try {
                    // First try: all putts dots composite (use captured base image if available)
                    if (Array.isArray(data.all_putt_overlays) && data.all_putt_overlays.length > 0) {
                        dotsImage = await this.composeDotsImageFromAllPutts(
                            data.all_putt_overlays,
                            data.analysis_size || (this.previewCanvas ? { w: this.previewCanvas.width, h: this.previewCanvas.height } : null),
                            baseSrc
                        );
                    }
                } catch (e) {
                    console.warn('Failed to generate all putts composite:', e);
                }
                
                try {
                    // Second try: single putt cropped images
                    if (!dotsImage && Array.isArray(data.path_points) && data.path_points.length > 0) {
                        dotsImage = await this.composeDotsImageFromPoints(
                            data.path_points, 
                            data.analysis_size || (this.previewCanvas ? { w: this.previewCanvas.width, h: this.previewCanvas.height } : null),
                            data.path_images,
                            data.path_boxes,
                            baseSrc,
                            false // Don't draw arc - it will be drawn by composeDotsImageFromAllPutts
                        );
                    }
                } catch (e) {
                    console.warn('Failed to generate single putt composite:', e);
                }
                
                // Fallback strategies - ensure we ALWAYS have an image
                try {
                    if (!dotsImage && data.result_image) {
                        dotsImage = String(data.result_image);
                    }
                } catch (e) {
                    console.warn('Failed to use captured result image:', e);
                }
                
                try {
                    if (!dotsImage && this.previewCanvas) {
                        dotsImage = this.previewCanvas.toDataURL('image/png');
                    }
                } catch (e) {
                    console.warn('Failed to capture preview canvas:', e);
                }
                
                // Last resort: capture video frame directly if canvas fails
                try {
                    if (!dotsImage && this.video && this.video.videoWidth > 0) {
                        const canvas = document.createElement('canvas');
                        canvas.width = this.video.videoWidth;
                        canvas.height = this.video.videoHeight;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(this.video, 0, 0);
                        dotsImage = canvas.toDataURL('image/jpeg', 0.8);
                    }
                } catch (e) {
                    console.warn('Failed to capture video frame:', e);
                }
                
                // Ultimate fallback: create a placeholder image
                if (!dotsImage || !dotsImage.startsWith('data:image')) {
                    try {
                        const canvas = document.createElement('canvas');
                        canvas.width = 400;
                        canvas.height = 300;
                        const ctx = canvas.getContext('2d');
                        
                        // Draw placeholder
                        ctx.fillStyle = '#1f2937';
                        ctx.fillRect(0, 0, canvas.width, canvas.height);
                        ctx.fillStyle = '#9ca3af';
                        ctx.font = '24px Arial';
                        ctx.textAlign = 'center';
                        ctx.fillText('Session Complete', canvas.width/2, canvas.height/2 - 20);
                        ctx.font = '16px Arial';
                        ctx.fillText('Image unavailable', canvas.width/2, canvas.height/2 + 20);
                        
                        dotsImage = canvas.toDataURL('image/png');
                    } catch (e) {
                        console.error('Failed to create placeholder image:', e);
                    }
                }
                
                // Display the image (guaranteed to have one now)
                if (dotsImage && dotsImage.startsWith('data:image')) {
                    const rEl = this.resultsRight.querySelector('img.result-frame');
                    if (rEl) {
                        rEl.src = dotsImage;
                        rEl.style.display = 'block';
                    } else {
                        const wrap = this.resultsRight;
                        const cap = document.createElement('div');
                        cap.className = 'metric';
                        cap.innerHTML = '<span class="name">Result Image</span><span class="value"></span>';
                        wrap.appendChild(cap);
                        const img = new Image();
                        img.alt = 'Result frame';
                        img.style.cssText = 'width:100%; border-radius:8px; border:1px solid #1f2937; display:block;';
                        img.src = dotsImage;
                        wrap.appendChild(img);
                    }
                    // Store for potential reuse
                    data.result_image = dotsImage;
                } else {
                    console.error('All image generation methods failed');
                }
                this.resultsModal.classList.add('show');
            }
            hideResults() {
                if (this.resultsModal) this.resultsModal.classList.remove('show');
            }
        }
        document.addEventListener('DOMContentLoaded', () => {
            // Initialize Lucide icons
            lucide.createIcons();
            
            const ui = new PuttUI();
            // If ws enabled, override transport with WS while preserving UX
            if (USE_WS) {
                try {
                    // Monkey-patch startSession and loop to use WS
                    ui.openSocket = function() {
                        this.ws = new WebSocket(WS_URL);
                        this.ws.binaryType = 'arraybuffer';
                        this.ws.onopen = () => {
                            this.ws.send(JSON.stringify({ type: 'start', user_id: `user_${Date.now()}` }));
                            this.startRttMonitoring();
                        };
                        this.ws.onmessage = (ev) => {
                            try {
                                const data = JSON.parse(ev.data);
                                if (data.type === 'started' && data.session_id) {
                                    this.sessionId = data.session_id;
                                    return;
                                }
                                if (data.type === 'pong' && data.t) {
                                    const rtt = Date.now() - data.t;
                                    this.updateRtt(rtt);
                                    return;
                                }
                                if (!data.success && data.error) {
                                    this.setStatus(`Error: ${data.error}`, 'waiting');
                                    return;
                                }
                                this.renderResults(data);
                                this.updateStartZone(data);
                                if (data.putt_completed && data.path_points && data.path_points.length > 1) {
                                    this.showPuttComplete((data.putts || []).length);
                                    if (data.path_images && data.path_images.length) {
                                        this.drawStickerOverlay(data.path_points, data.path_images, data.analysis_size);
                                    } else {
                                        this.drawPathOverlay(data.path_points, data.analysis_size);
                                    }
                                    setTimeout(() => { this.clearOverlay(); this.drawReferenceLine(); }, 1200);
                                }
                                if (data.state === 'completed') {
                                    this.setStatus('3 putts completed — Analysis ready', 'completed');
                                    this.running = false;
                                    document.getElementById('stopBtn').disabled = true;
                                    document.getElementById('startBtn').disabled = false;
                                    if (this.sessionBadge) this.sessionBadge.textContent = 'Completed';
                                    this.showSessionResults(data);
                                }
                            } catch {}
                        };
                        this.ws.onclose = () => { 
                            this.ws = null; 
                            this.running = false; 
                            this.stopRttMonitoring();
                        };
                        this.ws.onerror = () => {};
                    };
                    ui.startSession = async function() {
                        if (!this.ws) this.openSocket();
                        this.running = true;
                        document.getElementById('startBtn').disabled = true;
                        document.getElementById('stopBtn').disabled = false;
                        this.setStatus('Session started — Make your first putt', 'detecting');
                        if (this.sessionBadge) this.sessionBadge.textContent = 'Session Active';
                        
                        // Show start zone when session starts
                        if (START_ZONE_ENABLED) {
                            this.updateStartZone({ 
                                start_zone_enabled: true, 
                                start_zone_armed: false, 
                                start_zone_in_zone: false 
                            });
                        }
                        
                        this.loop = async () => {
                            while (this.running && this.stream) {
                                if (!this.ws || this.ws.readyState !== 1) { await new Promise(r => setTimeout(r, 40)); continue; }
                                this.frameCtx.drawImage(this.video, 0, 0, this.frameCanvas.width, this.frameCanvas.height);
                                const blob = await new Promise(r => this.frameCanvas.toBlob(r, 'image/webp', 0.55));
                                if (!blob) { await new Promise(r => setTimeout(r, 12)); continue; }
                                this.previewCtx.drawImage(this.video, 0, 0, this.previewCanvas.width, this.previewCanvas.height);
                                this.drawReferenceLine();
                                try {
                                    const buf = await blob.arrayBuffer();
                                    this.ws.send(buf);
                                } catch {}
                                await new Promise(r => setTimeout(r, 70));
                            }
                        };
                        this.loop();
                    };
                } catch {}
            }
        });
    </script>
