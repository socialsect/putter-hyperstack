
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<title>Golf Ball Tracker</title>
<style>
:root{
  --safe-top:env(safe-area-inset-top);--safe-right:env(safe-area-inset-right);
  --safe-bottom:env(safe-area-inset-bottom);--safe-left:env(safe-area-inset-left);
  --black:#0c0c0c;--red:#e7222a;--darkred:#ba1e1e;--steel:#1f1f1f;
  --r-sm:6px;--r-md:10px;--r-lg:16px;
}
html,body{margin:0;padding:0;background:var(--black);color:#fff;font-family:system-ui,-apple-system,sans-serif;height:100%;overflow:hidden;touch-action:manipulation;}
#wrap{position:fixed;inset:0;width:100vw;height:100vh;overflow:hidden;background:var(--black);}
video,canvas{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
#overlay{pointer-events:none;}
.btn-primary{position:absolute;left:50%;transform:translateX(-50%);bottom:calc(20px + var(--safe-bottom));background:linear-gradient(135deg,var(--red),var(--darkred));border:none;color:#fff;font-size:17px;font-weight:900;letter-spacing:.5px;text-transform:uppercase;padding:14px 32px;border-radius:999px;cursor:pointer;z-index:100;box-shadow:0 4px 20px rgba(231,34,42,.35);transition:transform .2s,box-shadow .2s;pointer-events:auto;}
.btn-primary:active:not(:disabled){transform:translateX(-50%) scale(.98);}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;}
.btn-secondary{position:absolute;left:50%;transform:translateX(-50%);background:rgba(31,31,31,.9);border:1px solid rgba(255,255,255,.15);color:#fff;font-size:13px;font-weight:700;letter-spacing:.5px;padding:10px 24px;border-radius:999px;cursor:pointer;z-index:100;box-shadow:0 3px 14px rgba(0,0,0,.3);transition:transform .2s,opacity .2s;pointer-events:auto;}
.btn-secondary:active:not(:disabled){transform:translateX(-50%) scale(.98);}
.btn-secondary:disabled{opacity:.4;cursor:not-allowed;}
.btn-secondary.active{background:rgba(231,34,42,.25);border-color:var(--red);color:var(--red);}
#btnStartCamera{bottom:calc(20px + var(--safe-bottom));}
#btnCaptureRef{bottom:calc(80px + var(--safe-bottom));}
#btnStartTracking{bottom:calc(135px + var(--safe-bottom));}
#btnReset{bottom:calc(190px + var(--safe-bottom));}
#btnDebug{bottom:calc(245px + var(--safe-bottom));font-size:11px;padding:8px 18px;}
#btnDebug.active{background:rgba(231,34,42,.25);border-color:var(--red);}
#statusBadge{position:absolute;top:calc(14px + var(--safe-top));left:calc(14px + var(--safe-left));font-size:12px;font-weight:800;padding:10px 14px;border-radius:var(--r-md);background:rgba(31,31,31,.9);border:1px solid rgba(255,255,255,.08);z-index:10;white-space:pre-line;max-width:220px;line-height:1.4;}
#metricsPanel{position:absolute;top:calc(110px + var(--safe-top));left:calc(14px + var(--safe-left));z-index:10;background:rgba(31,31,31,.9);border:1px solid rgba(255,255,255,.08);padding:12px 14px;border-radius:var(--r-md);backdrop-filter:blur(8px);display:none;min-width:140px;}
#metricsPanel.show{display:block;}
.metric-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;gap:16px;}
.metric-row:last-child{margin-bottom:0;}
.metric-label{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.6);font-weight:700;}
.metric-value{font-size:13px;color:#fff;font-weight:900;}
.detection-box{position:absolute;border:3px dashed rgba(255,255,255,.6);border-radius:var(--r-md);pointer-events:none;opacity:.7;transition:all .3s;}
.detection-box.detecting{border-color:var(--red);border-style:solid;animation:pulse-detect 1.5s ease-in-out infinite;}
.detection-box.locked{border-color:#00ff88;border-style:solid;opacity:1;animation:pulse-locked 2s ease-in-out infinite;}
.box-label{position:absolute;top:-28px;left:50%;transform:translateX(-50%);font-size:11px;font-weight:900;color:rgba(255,255,255,.9);text-transform:uppercase;letter-spacing:.15em;white-space:nowrap;}
@keyframes pulse-detect{0%,100%{opacity:.7;box-shadow:0 0 0 0 rgba(231,34,42,.4);}50%{opacity:1;box-shadow:0 0 20px 5px rgba(231,34,42,.2);}}
@keyframes pulse-locked{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(0,255,136,.4);}50%{opacity:.85;box-shadow:0 0 20px 5px rgba(0,255,136,.3);}}
.toast{position:fixed;bottom:calc(300px + var(--safe-bottom));left:50%;transform:translateX(-50%);background:rgba(31,31,31,.95);border:1px solid var(--red);border-radius:var(--r-md);padding:12px 20px;color:#fff;font-size:13px;font-weight:700;box-shadow:0 8px 32px rgba(0,0,0,.5);z-index:1000;animation:slideUp .3s ease-out;backdrop-filter:blur(10px);pointer-events:none;max-width:80vw;text-align:center;}
@keyframes slideUp{from{opacity:0;transform:translate(-50%,20px);}to{opacity:1;transform:translate(-50%,0);}}
#camPanel{position:absolute;bottom:calc(295px + var(--safe-bottom));left:50%;transform:translateX(-50%);background:rgba(20,20,20,.96);border:1px solid rgba(255,255,255,.12);border-radius:var(--r-lg);padding:14px 18px 12px;z-index:100;pointer-events:auto;display:none;min-width:300px;max-width:90vw;backdrop-filter:blur(10px);}
#camPanel.show{display:block;}
.cam-title{font-size:10px;font-weight:800;letter-spacing:.15em;color:rgba(255,255,255,.4);text-transform:uppercase;margin-bottom:10px;}
.slider-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.slider-row:last-child{margin-bottom:0;}
.slider-label{font-size:10px;font-weight:900;letter-spacing:.1em;color:rgba(255,255,255,.55);white-space:nowrap;min-width:72px;}
.slider-val{font-size:12px;color:var(--red);font-weight:900;min-width:52px;text-align:right;}
input[type=range]{-webkit-appearance:none;appearance:none;flex:1;height:4px;border-radius:99px;background:rgba(255,255,255,.15);outline:none;cursor:pointer;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:linear-gradient(135deg,var(--red),var(--darkred));cursor:pointer;box-shadow:0 2px 8px rgba(231,34,42,.5);}
input[type=range]::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:linear-gradient(135deg,var(--red),var(--darkred));border:none;cursor:pointer;}
.cam-hint{margin-top:8px;font-size:10px;color:rgba(255,255,255,.25);text-align:center;line-height:1.5;}
.cap-badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:9px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;margin-left:6px;vertical-align:middle;}
.cap-yes{background:rgba(0,255,100,.15);color:#00ff64;border:1px solid rgba(0,255,100,.3);}
.cap-no{background:rgba(255,100,100,.12);color:#ff6464;border:1px solid rgba(255,100,100,.25);}
#debugInfo{position:absolute;bottom:calc(14px + var(--safe-bottom));left:calc(14px + var(--safe-left));background:rgba(0,0,0,.85);border:1px solid rgba(255,255,100,.3);border-radius:var(--r-md);padding:8px 12px;font-size:10px;color:rgba(255,255,100,.9);line-height:1.6;z-index:200;display:none;max-width:240px;pointer-events:none;}
#debugInfo.show{display:block;}
</style>
</head>
<body>
<div id="wrap">
  <video id="video" playsinline autoplay muted></video>
  <canvas id="overlay"></canvas>
  <div id="statusBadge">Ready
Press START CAMERA</div>
  <button id="camPanelToggle">⚙️ CAMERA</button>
  <div id="metricsPanel">
    <div class="metric-row"><span class="metric-label">FRAMES</span><span class="metric-value" id="mFrames">0</span></div>
    <div class="metric-row"><span class="metric-label">ANGLE</span><span class="metric-value" id="mAngle">--</span></div>
    <div class="metric-row"><span class="metric-label">DIRECTION</span><span class="metric-value" id="mDir">--</span></div>
    <div class="metric-row"><span class="metric-label">SHUTTER</span><span class="metric-value" id="mShutter">--</span></div>
  </div>
  <div id="camPanel">
    <div class="cam-title">📷 Camera Controls</div>
    <div class="slider-row">
      <span class="slider-label">SHUTTER<span id="capShutter" class="cap-badge cap-no">N/A</span></span>
      <input type="range" id="slShutter" min="100" max="33333" step="100" value="500">
      <span class="slider-val" id="valShutter">1/2000</span>
    </div>
    <div class="slider-row">
      <span class="slider-label">ISO<span id="capISO" class="cap-badge cap-no">N/A</span></span>
      <input type="range" id="slISO" min="50" max="3200" step="50" value="100">
      <span class="slider-val" id="valISO">100</span>
    </div>
    <div class="slider-row">
      <span class="slider-label">EV COMP<span id="capEV" class="cap-badge cap-no">N/A</span></span>
      <input type="range" id="slEV" min="-3" max="0" step="0.5" value="-2">
      <span class="slider-val" id="valEV">-2.0</span>
    </div>
    <div class="cam-hint" id="camHint">Detecting camera capabilities…</div>
  </div>
  <div id="debugInfo"></div>
  <button class="btn-primary" id="btnStartCamera">START CAMERA</button>
  <button class="btn-secondary" id="btnCaptureRef" disabled>CAPTURE REFERENCE</button>
  <button class="btn-secondary" id="btnStartTracking" disabled>START TRACKING</button>
  <button class="btn-secondary" id="btnReset" disabled>RESET</button>
  <button class="btn-secondary" id="btnDebug" disabled>🔬 DEBUG OFF</button>
</div>
<script>
// ── CONFIG ──
const DIFF_THR=15,MIN_BLOB_PX=3,MAX_BLOB_PX=40000,MIN_RADIUS_PX=3,MAX_RADIUS_PX=200,STEP=3;
const RADIUS_TOLERANCE=0.75,ROI_TRACKING=250,ROI_SEARCHING=500,MAX_MISSED_FRAMES=20;
const USE_RAW_DETECTION=true;
const WHITE_BRIGHTNESS_MIN=145,WHITE_CHROMA_MAX=65;
const NCC_WARMUP_FRAMES=0,NCC_THRESHOLD=0.50;
const USE_VERTICAL_STRIP=true,STRIP_WIDTH_PERCENT=0.45,BOX_SIZE=200;
// CONE
const CONE_HALF_DEG=20;
const CONE_HALF_RAD=CONE_HALF_DEG*Math.PI/180;

const video=document.getElementById('video');
const overlay=document.getElementById('overlay');
const ctx=overlay.getContext('2d',{willReadFrequently:true});
const btnStartCamera=document.getElementById('btnStartCamera');
const btnCaptureRef=document.getElementById('btnCaptureRef');
const btnStartTracking=document.getElementById('btnStartTracking');
const btnReset=document.getElementById('btnReset');
const btnDebug=document.getElementById('btnDebug');
const statusBadge=document.getElementById('statusBadge');
const metricsPanel=document.getElementById('metricsPanel');
const camPanel=document.getElementById('camPanel');
const debugInfoEl=document.getElementById('debugInfo');
const slShutter=document.getElementById('slShutter');
const slISO=document.getElementById('slISO');
const slEV=document.getElementById('slEV');
const valShutter=document.getElementById('valShutter');
const valISO=document.getElementById('valISO');
const valEV=document.getElementById('valEV');
const capShutter=document.getElementById('capShutter');
const capISO=document.getElementById('capISO');
const capEV=document.getElementById('capEV');
const camHint=document.getElementById('camHint');

let stream=null,referenceFrame=null,tracking=false,capturedFrames=[];
let detectionBox=null,kalmanFilter=null,lastKnownPosition=null;
let lockedRadius=null,ballTemplate=null,missedFrames=0,trackingLoopId=null;
let lastCaptureTime=0,framesSinceFirstDetect=0,debugMode=false;
let lastDebugBlobs=[],lastDebugGrid=null,coneOrigin=null,ballInFlight=false;

const offscreen=document.createElement('canvas');
const offscreenCtx=offscreen.getContext('2d',{willReadFrequently:true});

// ── HELPERS ──
function showToast(msg,dur=3000){const old=document.querySelector('.toast');if(old)old.remove();const t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),dur);}
function setStatus(txt){statusBadge.textContent=txt;}
function updateMetrics(frames,angle,dir,shutterUs){
  document.getElementById('mFrames').textContent=frames;
  document.getElementById('mAngle').textContent=angle!=null?angle.toFixed(1)+'°':'--';
  document.getElementById('mDir').textContent=dir||'--';
  if(shutterUs!=null)document.getElementById('mShutter').textContent=shutterUs<1000?shutterUs+'µs':'1/'+Math.round(1e6/shutterUs)+'s';
}
function isWhitePixel(r,g,b){const lum=(r+g+b)/3;if(lum<WHITE_BRIGHTNESS_MIN)return false;return Math.max(r,g,b)-Math.min(r,g,b)<WHITE_CHROMA_MAX;}
function grabFrame(){offscreenCtx.drawImage(video,0,0);return offscreenCtx.getImageData(0,0,offscreen.width,offscreen.height);}

// ── CONE ──
// LEFTY: ball travels right-to-left in landscape (fwdAngle = Math.PI, i.e. -x direction)
function getConeApex(){
  if(coneOrigin) return coneOrigin;
  if(detectionBox&&video.videoWidth){
    const br=getDetectionBoxRect();
    return{x:br.x+br.width/2, y:br.y+br.height/2};
  }
  return{x:(video.videoWidth||640)/2, y:(video.videoHeight||480)/2};
}
function getForwardAngle(){
  // Lefty landscape: ball goes leftward = angle Math.PI (-x)
  // Portrait: ball goes upward = -π/2
  return window.innerWidth>=window.innerHeight ? Math.PI : -Math.PI/2;
}
function isInsideCone(cx,cy){
  if(!coneOrigin)return true;
  const br=getDetectionBoxRect();
  const isLandscape=window.innerWidth>=window.innerHeight;
  // Lefty: apex on RIGHT edge, rays go left through LEFT corners
  const apexX = isLandscape ? br.x+br.width : br.x+br.width/2;
  const apexY = isLandscape ? br.y+br.height/2 : br.y;
  const c1x   = isLandscape ? br.x : br.x;
  const c1y   = isLandscape ? br.y : br.y;
  const c2x   = isLandscape ? br.x : br.x+br.width;
  const c2y   = isLandscape ? br.y+br.height : br.y;
  const d1x=c1x-apexX, d1y=c1y-apexY;
  const d2x=c2x-apexX, d2y=c2y-apexY;
  const dx=cx-apexX, dy=cy-apexY;
  const fwdAngle=getForwardAngle();
  const fwd=dx*Math.cos(fwdAngle)+dy*Math.sin(fwdAngle);
  if(fwd<0)return false;
  // Cross products — winding: ray1 is top-left, ray2 is bottom-left (for lefty landscape)
  const cross1=d1x*dy-d1y*dx;
  const cross2=d2x*dy-d2y*dx;
  return cross1>=0&&cross2<=0;
}

// ── CAMERA CONTROLS ──
let imageCapturer=null,cameraCapabilities={};
async function initCameraControls(track){
  const caps=track.getCapabilities?track.getCapabilities():{};
  cameraCapabilities=caps;
  if(typeof ImageCapture!=='undefined'){try{imageCapturer=new ImageCapture(track);}catch(e){imageCapturer=null;}}
  const hasShutter=!!(caps.exposureTime);
  capShutter.textContent=hasShutter?'OK':'N/A';capShutter.className='cap-badge '+(hasShutter?'cap-yes':'cap-no');
  // Shutter: default to MINIMUM exposure time (fastest possible = Golfboy approach)
  // This freezes fast ball motion. Darker image is expected — use bright LED lighting.
  if(hasShutter){
    slShutter.min=caps.exposureTime.min??100;
    slShutter.max=caps.exposureTime.max??33333;
    slShutter.value=slShutter.min; // always start at minimum (fastest)
    slShutter.disabled=false;
    updateShutterLabel(slShutter.value);
  }else{slShutter.disabled=true;}
  const hasISO=!!(caps.iso);
  capISO.textContent=hasISO?'OK':'N/A';capISO.className='cap-badge '+(hasISO?'cap-yes':'cap-no');
  if(hasISO){slISO.min=caps.iso.min??50;slISO.max=caps.iso.max??3200;slISO.value=Math.max(slISO.min,Math.min(400,slISO.max));slISO.disabled=false;valISO.textContent=slISO.value;}else{slISO.disabled=true;}
  const hasEV=!!(caps.exposureCompensation);
  capEV.textContent=hasEV?'OK':'N/A';capEV.className='cap-badge '+(hasEV?'cap-yes':'cap-no');
  if(hasEV){slEV.min=caps.exposureCompensation.min??-3;slEV.max=caps.exposureCompensation.max??0;slEV.value=Math.max(slEV.min,-2);slEV.disabled=false;valEV.textContent=parseFloat(slEV.value).toFixed(1);}else{slEV.disabled=true;}
  const supported=[hasShutter&&'Shutter',hasISO&&'ISO',hasEV&&'EV'].filter(Boolean);
  camHint.textContent=supported.length===0
    ?'⚠️ No manual controls. Use bright flicker-free LED lighting for best results.'
    :'💡 Shutter set to MINIMUM (fastest). Image will be dark — use bright flicker-free LED lights. This is how Golfboy works.';
  await applyFastShutter(track);
}
function updateShutterLabel(us){us=parseInt(us);valShutter.textContent=us<1000?us+'µs':'1/'+Math.round(1e6/us)+'s';}
async function applyFastShutter(track){
  if(!track)return;const caps=cameraCapabilities;const constraints={advanced:[{}]};let applied=false;
  if(caps.exposureMode&&caps.exposureMode.includes('manual')&&caps.exposureTime){
    // Use absolute minimum exposure time — fastest shutter possible (Golfboy approach)
    const minET=caps.exposureTime.min??100;
    constraints.advanced[0].exposureMode='manual';
    constraints.advanced[0].exposureTime=minET;
    applied=true;
  }
  if(caps.exposureCompensation){const cap=caps.exposureCompensation;constraints.advanced[0].exposureCompensation=Math.max(cap.min??-3,Math.min(cap.max??0,-2.5));applied=true;}
  if(applied){try{await track.applyConstraints(constraints);const s=track.getSettings?track.getSettings():{};if(s.exposureTime){slShutter.value=s.exposureTime;updateShutterLabel(s.exposureTime);document.getElementById('mShutter').textContent=valShutter.textContent;}if(s.exposureCompensation!==undefined){slEV.value=s.exposureCompensation;valEV.textContent=parseFloat(s.exposureCompensation).toFixed(1);}}catch(e){console.warn('Fast shutter failed:',e);}}
}
async function applySliderConstraints(){
  const track=video.srcObject?.getVideoTracks()[0];if(!track)return;
  const caps=cameraCapabilities,adv={};
  if(caps.exposureTime&&!slShutter.disabled){adv.exposureMode='manual';adv.exposureTime=parseInt(slShutter.value);}
  if(caps.iso&&!slISO.disabled)adv.iso=parseInt(slISO.value);
  if(caps.exposureCompensation&&!slEV.disabled)adv.exposureCompensation=parseFloat(slEV.value);
  if(Object.keys(adv).length===0)return;
  try{await track.applyConstraints({advanced:[adv]});}catch(e){console.warn('Constraint failed:',e);}
}
slShutter.addEventListener('input',()=>{updateShutterLabel(slShutter.value);applySliderConstraints();});
slISO.addEventListener('input',()=>{valISO.textContent=slISO.value;applySliderConstraints();});
slEV.addEventListener('input',()=>{valEV.textContent=parseFloat(slEV.value).toFixed(1);applySliderConstraints();});

// ── KALMAN ──
class KalmanFilter{
  constructor(){this.x=0;this.y=0;this.vx=0;this.vy=0;this.initialized=false;this.processNoise=0.8;this.measurementNoise=12;this.lastUpdateTime=0;}
  init(x,y){this.x=x;this.y=y;this.vx=0;this.vy=0;this.initialized=true;this.lastUpdateTime=performance.now();}
  predict(){if(!this.initialized)return null;const dt=Math.min((performance.now()-this.lastUpdateTime)/1000,0.1);this.x+=this.vx*dt;this.y+=this.vy*dt;return{x:this.x,y:this.y};}
  update(m){if(!this.initialized){this.init(m.x,m.y);return{x:this.x,y:this.y};}const dt=Math.max((performance.now()-this.lastUpdateTime)/1000,0.001);this.lastUpdateTime=performance.now();const k=this.measurementNoise/(this.measurementNoise+this.processNoise);this.vx=(1-0.7)*this.vx+0.7*(m.x-this.x)/dt;this.vy=(1-0.7)*this.vy+0.7*(m.y-this.y)/dt;this.x+=k*(m.x-this.x);this.y+=k*(m.y-this.y);return{x:this.x,y:this.y};}
}

// ── CAMERA START ──
async function startCamera(){
  try{
    const tmp=await navigator.mediaDevices.getUserMedia({video:true});tmp.getTracks().forEach(t=>t.stop());
    const devices=await navigator.mediaDevices.enumerateDevices();const cams=devices.filter(d=>d.kind==='videoinput');
    const usb=cams.find(d=>/usb|uvc|capture|hdmi|elgato|avermedia|cam link/i.test(d.label));
    const back=cams.find(d=>/back|rear|environment/i.test(d.label));
    let constraints;
    if(usb)constraints={video:{deviceId:{exact:usb.deviceId},width:{ideal:1280},height:{ideal:720},frameRate:{ideal:60}}};
    else if(back)constraints={video:{deviceId:{exact:back.deviceId},width:{ideal:1280},height:{ideal:720},frameRate:{ideal:60}}};
    else constraints={video:{facingMode:{ideal:'environment'},width:{ideal:1280},height:{ideal:720},frameRate:{ideal:60}}};
    stream=await navigator.mediaDevices.getUserMedia(constraints);video.srcObject=stream;await video.play();
    const track=stream.getVideoTracks()[0];const settings=track.getSettings();const fps=settings.frameRate||'?';
    const applyDimensions=()=>{if(!video.videoWidth||!video.videoHeight)return;offscreen.width=video.videoWidth;offscreen.height=video.videoHeight;const dpr=window.devicePixelRatio||1;overlay.width=Math.round(window.innerWidth*dpr);overlay.height=Math.round(window.innerHeight*dpr);overlay.style.width=window.innerWidth+'px';overlay.style.height=window.innerHeight+'px';};
    if(video.videoWidth&&video.videoHeight)applyDimensions();else video.addEventListener('loadedmetadata',applyDimensions,{once:true});
    await new Promise(r=>setTimeout(r,600));await initCameraControls(track);
    document.getElementById('camPanelToggle').classList.add('show');btnStartCamera.disabled=true;btnCaptureRef.disabled=false;btnDebug.disabled=false;
    setStatus(`Camera Active\n${video.videoWidth}x${video.videoHeight} @${fps}fps\nReady to capture`);showToast(`📷 Camera started — ${fps}fps`);
  }catch(e){console.error(e);showToast('❌ Failed to access camera');setStatus('Camera Error');}
}

// ── DETECTION BOX ──
function createDetectionBox(){
  const old=document.querySelector('.detection-box');if(old)old.remove();
  const box=document.createElement('div');box.className='detection-box';
  box.style.cssText=`width:${BOX_SIZE}px;height:${BOX_SIZE}px;left:50%;top:50%;transform:translate(-50%,-50%)`;
  const lbl=document.createElement('div');lbl.className='box-label';lbl.textContent='BALL AREA';
  box.appendChild(lbl);document.getElementById('wrap').appendChild(box);detectionBox=box;
}

// ── COORD MAPPING ──
function getCoverTransform(){
  const vw=video.videoWidth,vh=video.videoHeight;if(!vw||!vh)return null;
  const dpr=window.devicePixelRatio||1;const sw=window.innerWidth*dpr,sh=window.innerHeight*dpr;
  const va=vw/vh,sa=sw/sh;let scale,cropX,cropY;
  if(va>sa){scale=sh/vh;cropX=(vw*scale-sw)/2;cropY=0;}else{scale=sw/vw;cropX=0;cropY=(vh*scale-sh)/2;}
  return{scale,cropX,cropY};
}
function screenToVideo(sx,sy){
  const vw=video.videoWidth,vh=video.videoHeight;if(!vw||!vh)return{x:sx,y:sy};
  const elR=video.getBoundingClientRect();const va=vw/vh,ea=elR.width/elR.height;
  let scale,cropX,cropY;
  if(va>ea){scale=elR.height/vh;cropX=(vw*scale-elR.width)/2;cropY=0;}else{scale=elR.width/vw;cropX=0;cropY=(vh*scale-elR.height)/2;}
  return{x:(sx+cropX)/scale,y:(sy+cropY)/scale};
}
function getDetectionBoxRect(){
  if(!video.videoWidth||!video.videoHeight)return{x:0,y:0,width:100,height:100};
  const elR=video.getBoundingClientRect(),bR=detectionBox.getBoundingClientRect();
  const tl=screenToVideo(bR.left-elR.left,bR.top-elR.top);const br=screenToVideo(bR.left-elR.left+bR.width,bR.top-elR.top+bR.height);
  return{x:tl.x,y:tl.y,width:br.x-tl.x,height:br.y-tl.y};
}

// ── SIZE LOCK ──
function passesSizeLock(r){if(lockedRadius===null)return true;return Math.abs(r-lockedRadius)/lockedRadius<=RADIUS_TOLERANCE;}

// ── NCC ──
function buildTemplate(frame,cx,cy,radius){
  const side=Math.max(7,Math.round(radius*2)|1),half=Math.floor(side/2);const w=frame.width,patch=new Float32Array(side*side);let sum=0;
  for(let dy=-half;dy<=half;dy++)for(let dx=-half;dx<=half;dx++){const px=Math.round(cx)+dx,py=Math.round(cy)+dy;if(px<0||px>=w||py<0||py>=frame.height)continue;const i=(py*w+px)*4,lum=(frame.data[i]+frame.data[i+1]+frame.data[i+2])/3;patch[(dy+half)*side+(dx+half)]=lum;sum+=lum;}
  const mean=sum/patch.length;let norm=0;for(let i=0;i<patch.length;i++){patch[i]-=mean;norm+=patch[i]*patch[i];}norm=Math.sqrt(norm)||1;for(let i=0;i<patch.length;i++)patch[i]/=norm;return{patch,side};
}
function nccScore(frame,cx,cy){
  if(!ballTemplate||framesSinceFirstDetect<NCC_WARMUP_FRAMES)return 1;
  const{patch,side}=ballTemplate,half=Math.floor(side/2),w=frame.width;const cand=new Float32Array(side*side);let sum=0;
  for(let dy=-half;dy<=half;dy++)for(let dx=-half;dx<=half;dx++){const px=Math.round(cx)+dx,py=Math.round(cy)+dy;if(px<0||px>=w||py<0||py>=frame.height)continue;const i=(py*w+px)*4,lum=(frame.data[i]+frame.data[i+1]+frame.data[i+2])/3;cand[(dy+half)*side+(dx+half)]=lum;sum+=lum;}
  const mean=sum/cand.length;let norm=0;for(let i=0;i<cand.length;i++){cand[i]-=mean;norm+=cand[i]*cand[i];}norm=Math.sqrt(norm)||1;let dot=0;for(let i=0;i<patch.length;i++)dot+=patch[i]*(cand[i]/norm);return dot;
}

// ── FIND BALL ──
// Computes the axis-aligned bounding box of the ±20° cone from apex out to
// the frame edge, so the pixel scan is tight to the valid zone.
function getConeROI(w,h){
  const isLandscape=window.innerWidth>=window.innerHeight;
  const extLen=Math.sqrt(w*w+h*h)*1.1;
  const br=getDetectionBoxRect();
  // Lefty landscape: apex = right-edge midpoint, rays through left corners
  const apexX = isLandscape ? br.x+br.width : br.x+br.width/2;
  const apexY = isLandscape ? br.y+br.height/2 : br.y;
  const c1x   = isLandscape ? br.x : br.x;
  const c1y   = isLandscape ? br.y : br.y;
  const c2x   = isLandscape ? br.x : br.x+br.width;
  const c2y   = isLandscape ? br.y+br.height : br.y;
  const d1x=c1x-apexX, d1y=c1y-apexY, l1=Math.sqrt(d1x*d1x+d1y*d1y)||1;
  const d2x=c2x-apexX, d2y=c2y-apexY, l2=Math.sqrt(d2x*d2x+d2y*d2y)||1;
  const r1x=apexX+(d1x/l1)*extLen, r1y=apexY+(d1y/l1)*extLen;
  const r2x=apexX+(d2x/l2)*extLen, r2y=apexY+(d2y/l2)*extLen;
  // Union with full box
  const xs=[br.x,br.x+br.width,r1x,r2x], ys=[br.y,br.y+br.height,r1y,r2y];
  return{
    xMin:Math.max(0,Math.floor(Math.min(...xs))),
    xMax:Math.min(w,Math.ceil(Math.max(...xs))),
    yMin:Math.max(0,Math.floor(Math.min(...ys))),
    yMax:Math.min(h,Math.ceil(Math.max(...ys)))
  };
}

// Returns true if (cx,cy) is inside the detection box rect
function isInsideBox(cx,cy){
  const br=getDetectionBoxRect();
  return cx>=br.x&&cx<=br.x+br.width&&cy>=br.y&&cy<=br.y+br.height;
}

function findBall(refFrame,curFrame,boxRect,searchFull=false){
  const w=curFrame.width,h=curFrame.height;let xMin,xMax,yMin,yMax;
  if(searchFull&&ballInFlight&&lastKnownPosition){
    // Ball in flight — ROI expands with each missed frame so fast ball isn't lost
    const R=ROI_TRACKING+missedFrames*80;
    xMin=Math.max(0,Math.floor(lastKnownPosition.x-R));
    xMax=Math.min(w,Math.ceil(lastKnownPosition.x+R));
    yMin=Math.max(0,Math.floor(lastKnownPosition.y-R));
    yMax=Math.min(h,Math.ceil(lastKnownPosition.y+R));
  }else{
    // Waiting for shot: always scan full box + cone region
    const roi=getConeROI(w,h);
    xMin=roi.xMin;xMax=roi.xMax;yMin=roi.yMin;yMax=roi.yMax;
  }
  const gridW=Math.max(1,Math.floor((xMax-xMin)/STEP));const gridH=Math.max(1,Math.floor((yMax-yMin)/STEP));const grid=new Uint8Array(gridW*gridH);
  let idx=0;
  for(let gy=0;gy<gridH;gy++){const absY=yMin+gy*STEP;for(let gx=0;gx<gridW;gx++,idx++){const absX=xMin+gx*STEP,fi=(absY*w+absX)*4;const dr=Math.abs(curFrame.data[fi]-refFrame.data[fi]),dg=Math.abs(curFrame.data[fi+1]-refFrame.data[fi+1]),db=Math.abs(curFrame.data[fi+2]-refFrame.data[fi+2]);const avgDiff=(dr+dg+db)/3;const r=curFrame.data[fi],g=curFrame.data[fi+1],b=curFrame.data[fi+2],lum=(r+g+b)/3;if(avgDiff>DIFF_THR&&(isWhitePixel(r,g,b)||lum>200))grid[idx]=1;}}
  if(debugMode)lastDebugGrid={grid,xMin,yMin,gridW,gridH};
  const visited=new Uint8Array(gridW*gridH);let best=null,bestScore=0;const blobs=[];
  for(let i=0;i<grid.length;i++){
    if(!grid[i]||visited[i])continue;const q=[i];visited[i]=1;const comp=[];
    for(let qi=0;qi<q.length;qi++){const c=q[qi];comp.push(c);const gx=c%gridW,gy=Math.floor(c/gridW);const n1=c-1,n2=c+1,n3=c-gridW,n4=c+gridW;if(gx>0&&grid[n1]&&!visited[n1]){visited[n1]=1;q.push(n1);}if(gx<gridW-1&&grid[n2]&&!visited[n2]){visited[n2]=1;q.push(n2);}if(gy>0&&grid[n3]&&!visited[n3]){visited[n3]=1;q.push(n3);}if(gy<gridH-1&&grid[n4]&&!visited[n4]){visited[n4]=1;q.push(n4);}}
    if(comp.length<MIN_BLOB_PX||comp.length>MAX_BLOB_PX)continue;
    let sx=0,sy=0,mgx=Infinity,xgx=-Infinity,mgy=Infinity,ygy=-Infinity;
    for(const c of comp){const gx=c%gridW,gy=Math.floor(c/gridW);sx+=gx;sy+=gy;if(gx<mgx)mgx=gx;if(gx>xgx)xgx=gx;if(gy<mgy)mgy=gy;if(gy>ygy)ygy=gy;}
    const cx=xMin+(sx/comp.length)*STEP,cy=yMin+(sy/comp.length)*STEP;
    const bw=(xgx-mgx+1)*STEP,bh=(ygy-mgy+1)*STEP;const radius=Math.max(bw,bh)/2;
    if(radius<MIN_RADIUS_PX||radius>MAX_RADIUS_PX)continue;
    if((bw>=bh?bw/bh:bh/bw)>5)continue;
    // Size lock only before ball is in flight
    if(!ballInFlight&&!passesSizeLock(radius))continue;
    // Cone filter only applies once in flight and outside box
    if(ballInFlight&&!isInsideBox(cx,cy)&&!isInsideCone(cx,cy))continue;
    let score=comp.length*(comp.length/(bw*bh));const ncc=nccScore(curFrame,cx,cy);if(ncc>NCC_THRESHOLD)score*=(ncc+0.5);
    if(lastKnownPosition&&searchFull){const dd=Math.sqrt((cx-lastKnownPosition.x)**2+(cy-lastKnownPosition.y)**2);score/=(1+dd*0.015);}
    blobs.push({cx,cy,radius,score,size:comp.length});if(score>bestScore){bestScore=score;best={cx,cy,radius,size:comp.length};}
  }
  if(debugMode)lastDebugBlobs=blobs;if(!best)return null;return{x:best.cx,y:best.cy,radius:best.radius};
}

// ── CAPTURE REF ──
function captureReference(){referenceFrame=grabFrame();btnStartTracking.disabled=false;btnReset.disabled=false;detectionBox.classList.add('detecting');setStatus('Reference Captured\nPlace ball in box\nthen START TRACKING');showToast('✅ Reference captured');}

// ── START TRACKING ──
function startTracking(){
  if(!referenceFrame)return;tracking=true;capturedFrames=[];kalmanFilter=new KalmanFilter();
  lastKnownPosition=null;lockedRadius=null;ballTemplate=null;missedFrames=0;lastCaptureTime=0;
  framesSinceFirstDetect=0;coneOrigin=null;ballInFlight=false;lastDebugBlobs=[];lastDebugGrid=null;
  detectionBox.classList.remove('detecting');detectionBox.classList.add('locked');metricsPanel.classList.add('show');
  btnStartTracking.disabled=true;btnCaptureRef.disabled=true;setStatus('TRACKING ACTIVE');showToast('🏌️ Tracking started — swing!');
  startTrackingLoop();
}

// ── TRACKING LOOP ──
function startTrackingLoop(){if(!tracking)return;if('requestVideoFrameCallback' in HTMLVideoElement.prototype)trackingLoopId=video.requestVideoFrameCallback(onFrame);else trackingLoopId=requestAnimationFrame(onFrameRAF);}
function onFrame(){if(!tracking)return;processFrame();if(tracking)trackingLoopId=video.requestVideoFrameCallback(onFrame);}
function onFrameRAF(){if(!tracking)return;processFrame();if(tracking)trackingLoopId=requestAnimationFrame(onFrameRAF);}

function processFrame(){
  if(!tracking)return;lastCaptureTime=performance.now();
  const cur=grabFrame();const box=getDetectionBoxRect();const pos=findBall(referenceFrame,cur,box,true);
  if(pos){
    missedFrames=0;framesSinceFirstDetect++;
    // Trip ballInFlight the moment the ball leaves the detection box
    if(!ballInFlight&&!isInsideBox(pos.x,pos.y)){
      ballInFlight=true;
      coneOrigin={x:pos.x,y:pos.y};
    }
    const finalPos=USE_RAW_DETECTION?{x:pos.x,y:pos.y}:kalmanFilter.update(pos);
    if(USE_RAW_DETECTION)kalmanFilter.update(pos);
    lastKnownPosition=finalPos;
    if(lockedRadius===null){lockedRadius=pos.radius;ballTemplate=buildTemplate(cur,pos.x,pos.y,pos.radius);}
    else if(!ballInFlight){lockedRadius=0.5*lockedRadius+0.5*pos.radius;} // don't update radius once in flight
    capturedFrames.push({x:finalPos.x,y:finalPos.y,radius:lockedRadius,t:performance.now()});
    if(capturedFrames.length>=3){const traj=calcTrajectory();if(traj)updateMetrics(capturedFrames.length,traj.angle,traj.direction,null);else updateMetrics(capturedFrames.length,null,null,null);}else{updateMetrics(capturedFrames.length,null,null,null);}
    if(debugMode)updateDebugInfo(pos,true);
  }else{
    // Only count misses once ball has actually launched
    if(ballInFlight){
      missedFrames++;
      if(missedFrames<=MAX_MISSED_FRAMES&&kalmanFilter&&kalmanFilter.initialized){
        const pred=kalmanFilter.predict();
        lastKnownPosition=pred;
        capturedFrames.push({x:pred.x,y:pred.y,radius:lockedRadius||20,t:performance.now(),predicted:true});
        updateMetrics(capturedFrames.length,null,null,null);
      }else if(missedFrames>MAX_MISSED_FRAMES){
        setStatus('Shot Complete ✓\nBall exited frame');showToast('🏌️ Shot complete — press RESET');
        tracking=false;if(trackingLoopId!==null){if('requestVideoFrameCallback' in HTMLVideoElement.prototype)video.cancelVideoFrameCallback(trackingLoopId);else cancelAnimationFrame(trackingLoopId);trackingLoopId=null;}
        btnReset.disabled=false;
      }
    }
    // If ball not yet in flight and not found, just keep waiting silently
    if(debugMode)updateDebugInfo(null,false);
  }
}

// ── DEBUG ──
function updateDebugInfo(pos,found){
  if(!debugMode)return;const track=video.srcObject?.getVideoTracks()[0];let shutterStr='--',isoStr='--';
  if(track?.getSettings){const s=track.getSettings();if(s.exposureTime)shutterStr='1/'+Math.round(1e6/s.exposureTime)+'s ('+s.exposureTime+'µs)';if(s.iso)isoStr=s.iso;}
  debugInfoEl.textContent=[`📹 ${video.videoWidth}x${video.videoHeight}`,`⚡ Shutter: ${shutterStr}`,`📷 ISO: ${isoStr}`,`🔍 Blobs found: ${lastDebugBlobs.length}`,found?`✅ Ball: (${Math.round(pos.x)},${Math.round(pos.y)}) r=${Math.round(pos.radius)}`:`❌ Ball: not found (miss ${missedFrames})`,`📦 Frames: ${capturedFrames.length}`,`🔒 Locked r: ${lockedRadius?Math.round(lockedRadius):'--'}`,`🚀 In flight: ${ballInFlight}`,`🎯 Cone origin: ${coneOrigin?`(${Math.round(coneOrigin.x)},${Math.round(coneOrigin.y)})`:'--'}`].join('\n');

// ── TRAJECTORY ──
function calcTrajectory(){
  if(capturedFrames.length<3)return null;const f=capturedFrames[0],l=capturedFrames[capturedFrames.length-1];
  const dx=l.x-f.x,dy=-(l.y-f.y);let deg=Math.atan2(dy,dx)*(180/Math.PI);deg=Math.max(-90,Math.min(90,deg));
  return{angle:deg,direction:deg>2?'Right':deg<-2?'Left':'Straight'};
}

// ── DRAW ──
function applyDrawTransform(){const t=getCoverTransform();if(!t)return false;ctx.setTransform(t.scale,0,0,t.scale,-t.cropX,-t.cropY);return true;}
function resetTransform(){ctx.setTransform(1,0,0,1,0,0);}

// ── CONE + FORWARD ARROW DRAWING ──
function drawConeAndArrow(vw,vh,t){
  const isLandscape=window.innerWidth>=window.innerHeight;
  const lw=t?1.5/t.scale:1.5;
  const sc=t?1/t.scale:1;
  const fwdAngle=getForwardAngle(); // Math.PI for lefty landscape

  const br=getDetectionBoxRect();
  // Lefty landscape: apex = midpoint of RIGHT edge, rays go left through LEFT corners
  const apexX = isLandscape ? br.x+br.width : br.x+br.width/2;
  const apexY = isLandscape ? br.y+br.height/2 : br.y;
  const c1x   = isLandscape ? br.x : br.x;
  const c1y   = isLandscape ? br.y : br.y;
  const c2x   = isLandscape ? br.x : br.x+br.width;
  const c2y   = isLandscape ? br.y+br.height : br.y;

  const extLen=isLandscape?vw*1.5:vh*1.5;
  const d1x=c1x-apexX, d1y=c1y-apexY, l1=Math.sqrt(d1x*d1x+d1y*d1y)||1;
  const d2x=c2x-apexX, d2y=c2y-apexY, l2=Math.sqrt(d2x*d2x+d2y*d2y)||1;
  const r1x=apexX+(d1x/l1)*extLen, r1y=apexY+(d1y/l1)*extLen;
  const r2x=apexX+(d2x/l2)*extLen, r2y=apexY+(d2y/l2)*extLen;

  const perpX=-Math.sin(fwdAngle), perpY=Math.cos(fwdAngle);

  ctx.save();

  // Filled triangle zone
  ctx.beginPath();
  ctx.moveTo(apexX,apexY);
  ctx.lineTo(r1x,r1y);
  ctx.lineTo(r2x,r2y);
  ctx.closePath();
  ctx.fillStyle='rgba(255,220,0,0.06)';ctx.fill();

  // Cone boundary dashes
  ctx.setLineDash([Math.round(12*sc),Math.round(5*sc)]);
  ctx.strokeStyle='rgba(255,220,0,0.5)';ctx.lineWidth=lw;
  ctx.beginPath();ctx.moveTo(apexX,apexY);ctx.lineTo(r1x,r1y);ctx.stroke();
  ctx.beginPath();ctx.moveTo(apexX,apexY);ctx.lineTo(r2x,r2y);ctx.stroke();
  ctx.setLineDash([]);

  // Angle labels
  ctx.font=`bold ${Math.round(10*sc)}px system-ui`;ctx.fillStyle='rgba(255,220,0,0.8)';ctx.textAlign='center';
  const lblOff=Math.round(22*sc);
  ctx.fillText(`${CONE_HALF_DEG}°`,c1x+(d1x/l1)*lblOff,c1y+(d1y/l1)*lblOff);
  ctx.fillText(`${CONE_HALF_DEG}°`,c2x+(d2x/l2)*lblOff,c2y+(d2y/l2)*lblOff);

  // ── Centre guideline — full-width horizontal at box vertical centre ──
  ctx.save();
  if(isLandscape){
    const gy=apexY; // box vertical centre
    ctx.strokeStyle='rgba(255,255,255,0.18)';ctx.lineWidth=lw*0.8;
    ctx.beginPath();ctx.moveTo(0,gy);ctx.lineTo(vw,gy);ctx.stroke();
    const notchH=Math.round(8*sc);
    ctx.strokeStyle='rgba(255,255,255,0.45)';ctx.lineWidth=lw*1.2;
    ctx.beginPath();ctx.moveTo(vw/2-notchH,gy);ctx.lineTo(vw/2+notchH,gy);ctx.stroke();
  } else {
    const gx=apexX;
    ctx.strokeStyle='rgba(255,255,255,0.18)';ctx.lineWidth=lw*0.8;
    ctx.beginPath();ctx.moveTo(gx,0);ctx.lineTo(gx,vh);ctx.stroke();
    const notchW=Math.round(8*sc);
    ctx.strokeStyle='rgba(255,255,255,0.45)';ctx.lineWidth=lw*1.2;
    ctx.beginPath();ctx.moveTo(gx,vh/2-notchW);ctx.lineTo(gx,vh/2+notchW);ctx.stroke();
  }
  ctx.restore();

  // ── Forward arrow (points LEFT for lefty) ──
  const shaftLen=Math.round(sc*(isLandscape?vw*0.07:vh*0.07));
  const headLen=Math.round(shaftLen*0.40);
  const headW=headLen*0.50;
  // Start arrow from left side of box, pointing further left
  const arrowOriginX=isLandscape?br.x:apexX;
  const arrowOriginY=isLandscape?apexY:br.y;
  const aStartX=arrowOriginX+Math.cos(fwdAngle)*shaftLen*0.3;
  const aStartY=arrowOriginY+Math.sin(fwdAngle)*shaftLen*0.3;
  const aTipX=aStartX+Math.cos(fwdAngle)*shaftLen;
  const aTipY=aStartY+Math.sin(fwdAngle)*shaftLen;
  const aBaseX=aTipX-Math.cos(fwdAngle)*headLen;
  const aBaseY=aTipY-Math.sin(fwdAngle)*headLen;

  ctx.strokeStyle='rgba(255,255,255,0.45)';ctx.lineWidth=lw*1.2;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(aStartX,aStartY);ctx.lineTo(aBaseX,aBaseY);ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,0.45)';
  ctx.beginPath();ctx.moveTo(aTipX,aTipY);ctx.lineTo(aBaseX+perpX*headW,aBaseY+perpY*headW);ctx.lineTo(aBaseX-perpX*headW,aBaseY-perpY*headW);ctx.closePath();ctx.fill();

  ctx.restore();
}

function drawFrame(){
  const dpr=window.devicePixelRatio||1;const sw=Math.round(window.innerWidth*dpr),sh=Math.round(window.innerHeight*dpr);
  if(overlay.width!==sw||overlay.height!==sh){overlay.width=sw;overlay.height=sh;overlay.style.width=window.innerWidth+'px';overlay.style.height=window.innerHeight+'px';}
  ctx.clearRect(0,0,sw,sh);const hasT=applyDrawTransform();const vw=video.videoWidth||sw,vh=video.videoHeight||sh;const t=hasT?getCoverTransform():null;const lw=t?2/t.scale:2;

  if(debugMode&&lastDebugGrid){
    const{grid,xMin,yMin,gridW,gridH}=lastDebugGrid;ctx.save();
    for(let gy=0;gy<gridH;gy++)for(let gx=0;gx<gridW;gx++){if(grid[gy*gridW+gx]){const px=xMin+gx*STEP,py=yMin+gy*STEP;ctx.fillStyle='rgba(255,80,0,0.55)';ctx.fillRect(px-1,py-1,STEP+1,STEP+1);}}
    for(const b of lastDebugBlobs){ctx.strokeStyle='rgba(255,160,0,0.8)';ctx.lineWidth=lw;ctx.beginPath();ctx.arc(b.cx,b.cy,b.radius,0,Math.PI*2);ctx.stroke();ctx.fillStyle='rgba(255,200,0,0.9)';ctx.font=`${Math.round(10/t.scale)}px monospace`;ctx.fillText(Math.round(b.score),b.cx+b.radius+2,b.cy);}
    ctx.restore();
  }

  if(detectionBox&&!tracking){
    const br=getDetectionBoxRect();ctx.save();ctx.strokeStyle='rgba(0,255,136,0.6)';ctx.lineWidth=lw;ctx.strokeRect(br.x,br.y,br.width,br.height);
    ctx.beginPath();const cx=br.x+br.width/2,cy=br.y+br.height/2;ctx.moveTo(cx,br.y);ctx.lineTo(cx,br.y+br.height);ctx.moveTo(br.x,cy);ctx.lineTo(br.x+br.width,cy);ctx.stroke();ctx.restore();
  }

  if(tracking||capturedFrames.length>0){
    // Show cone ROI bounding box outline (replaces old strip lines)
    if(debugMode&&coneOrigin){
      const roi=getConeROI(vw,vh);ctx.save();
      ctx.strokeStyle='rgba(0,200,255,0.5)';ctx.lineWidth=lw*0.7;
      ctx.setLineDash([Math.round(6/(t?.scale||1)),Math.round(4/(t?.scale||1))]);
      ctx.strokeRect(roi.xMin,roi.yMin,roi.xMax-roi.xMin,roi.yMax-roi.yMin);
      ctx.setLineDash([]);
      ctx.fillStyle='rgba(0,200,255,0.7)';ctx.font=`bold ${Math.round(10/(t?.scale||1))}px system-ui`;
      ctx.fillText('CONE ROI',roi.xMin+4,roi.yMin-4);
      ctx.restore();
    }
  }

  // ── CONE + ARROW (always shown when camera active) ──
  if(video.videoWidth&&video.videoHeight){drawConeAndArrow(vw,vh,t);}

  if(capturedFrames.length>0){
    if(capturedFrames.length>1){ctx.strokeStyle='rgba(0,255,100,0.9)';ctx.lineWidth=lw*2;ctx.lineCap='round';ctx.lineJoin='round';ctx.beginPath();ctx.moveTo(capturedFrames[0].x,capturedFrames[0].y);for(let i=1;i<capturedFrames.length;i++)ctx.lineTo(capturedFrames[i].x,capturedFrames[i].y);ctx.stroke();}
    for(let i=0;i<capturedFrames.length;i++){const f=capturedFrames[i],op=0.25+(i/capturedFrames.length)*0.25;ctx.fillStyle=f.predicted?`rgba(255,255,100,${op})`:`rgba(255,255,255,${op})`;ctx.strokeStyle=f.predicted?`rgba(200,200,100,${op*.8})`:`rgba(200,200,200,${op*.8})`;ctx.lineWidth=lw;ctx.beginPath();ctx.arc(f.x,f.y,f.radius,0,Math.PI*2);ctx.fill();ctx.stroke();}
    const lat=capturedFrames[capturedFrames.length-1];ctx.strokeStyle='rgba(255,220,0,1)';ctx.lineWidth=lw*1.5;ctx.beginPath();ctx.arc(lat.x,lat.y,lat.radius+5,0,Math.PI*2);ctx.stroke();
  }
  resetTransform();
}

function renderLoop(){requestAnimationFrame(renderLoop);if(!video.videoWidth||!overlay.width)return;drawFrame();}

function reset(){
  tracking=false;
  if(trackingLoopId!==null){if('requestVideoFrameCallback' in HTMLVideoElement.prototype)video.cancelVideoFrameCallback(trackingLoopId);else cancelAnimationFrame(trackingLoopId);trackingLoopId=null;}
  referenceFrame=null;capturedFrames=[];kalmanFilter=null;lastKnownPosition=null;lockedRadius=null;ballTemplate=null;
  missedFrames=0;lastCaptureTime=0;framesSinceFirstDetect=0;coneOrigin=null;ballInFlight=false;lastDebugBlobs=[];lastDebugGrid=null;
  ctx.clearRect(0,0,overlay.width,overlay.height);detectionBox.classList.remove('detecting','locked');metricsPanel.classList.remove('show');
  btnCaptureRef.disabled=false;btnStartTracking.disabled=true;updateMetrics(0,null,null,null);setStatus('Ready to Capture\nPress CAPTURE REFERENCE');showToast('🔄 Reset');
}

function toggleDebug(){
  debugMode=!debugMode;btnDebug.textContent=debugMode?'🔬 DEBUG ON':'🔬 DEBUG OFF';btnDebug.classList.toggle('active',debugMode);debugInfoEl.classList.toggle('show',debugMode);
  if(!debugMode){lastDebugBlobs=[];lastDebugGrid=null;debugInfoEl.textContent='';}showToast(debugMode?'🔬 Debug ON — orange dots = detected pixels':'🔬 Debug OFF');
}

const camPanelToggleBtn=document.getElementById('camPanelToggle');
camPanelToggleBtn.addEventListener('click',()=>{camPanel.classList.toggle('show');camPanelToggleBtn.textContent=camPanel.classList.contains('show')?'✕ CLOSE':'⚙️ CAMERA';});
btnStartCamera.addEventListener('click',startCamera);
btnCaptureRef.addEventListener('click',captureReference);
btnStartTracking.addEventListener('click',startTracking);
btnReset.addEventListener('click',reset);
btnDebug.addEventListener('click',toggleDebug);

createDetectionBox();setStatus('Ready\nPress START CAMERA');renderLoop();
</script>
</body>
